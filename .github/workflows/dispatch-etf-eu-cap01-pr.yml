name: Dispatch ETF EU CAP01 from PR

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - "control/run_queue/etf_eu_capital_activation_request_*.md"

permissions:
  contents: read
  actions: write

jobs:
  dispatch-cap01:
    runs-on: ubuntu-latest
    steps:
      - name: Check out PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Resolve newest CAP01 request in PR
        id: request
        run: |
          set -euo pipefail
          git fetch origin main
          REQUEST_PATH="$(git diff --name-only origin/main...HEAD | grep '^control/run_queue/etf_eu_capital_activation_request_.*\.md$' | sort | tail -1 || true)"
          if [ -z "$REQUEST_PATH" ] || [ ! -f "$REQUEST_PATH" ]; then
            echo "ETF_EU_CAP01_PR_REQUEST_NOT_FOUND" >&2
            exit 1
          fi
          echo "request_path=$REQUEST_PATH" >> "$GITHUB_OUTPUT"

      - name: Dispatch guarded CAP01 workflow
        env:
          GH_TOKEN: ${{ github.token }}
          REQUEST_PATH: ${{ steps.request.outputs.request_path }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          gh workflow run run-etf-eu-capital-activation.yml \
            --ref "$HEAD_REF" \
            -f request_path="$REQUEST_PATH"
          echo "ETF_EU_CAP01_DISPATCHED | ref=$HEAD_REF | request=$REQUEST_PATH"
