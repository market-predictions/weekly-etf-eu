name: ETF EU - Finalize Package Readiness 20260717

on:
  workflow_run:
    workflows:
      - "ETF EU - Generate and Validate Preview (NO EMAIL)"
    types:
      - completed

permissions:
  contents: write

jobs:
  finalize-readiness:
    runs-on: ubuntu-latest
    env:
      TARGET_RUN_ID: "20260717_141500"
      TARGET_REPORT_DATE: "2026-07-17"
    steps:
      - name: Check out current main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - id: regression
        name: Run readiness regression tests
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install pytest
          python -m pytest -q \
            tests/test_etf_eu_readiness_v2_funded_aware.py \
            tests/test_etf_eu_markdown_funded_reconciliation.py \
            tests/test_etf_eu_final_visual_polish.py

      - id: metadata
        name: Reconcile package metadata
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          run_id = os.environ["TARGET_RUN_ID"]
          report_date = os.environ["TARGET_REPORT_DATE"]
          paths = [
              Path(f"output/fresh_generation/etf_eu_fresh_generation_package_manifest_{run_id}.json"),
              Path(f"output/fresh_generation/etf_eu_ready_for_controlled_delivery_{run_id}.json"),
              Path(f"output/run_manifests/etf_eu_routine_run_manifest_{report_date}_{run_id}.json"),
          ]
          for path in paths:
              payload = json.loads(path.read_text(encoding="utf-8"))
              payload["markdown_role"] = "funded_state_reconciled_audit_companion_not_v2_render_source"
              payload["markdown_generation_status"] = "generated_funded_state_reconciled_audit_companion"
              path.write_text(json.dumps(payload, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          PY

      - id: readiness
        name: Run official package readiness gate
        run: |
          set -euo pipefail
          python tools/prepare_etf_eu_routine_package_readiness_v2.py \
            --manifest "output/fresh_generation/etf_eu_fresh_generation_package_manifest_${TARGET_RUN_ID}.json" \
            --ready-artifact "output/fresh_generation/etf_eu_ready_for_controlled_delivery_${TARGET_RUN_ID}.json" \
            --routine-manifest "output/run_manifests/etf_eu_routine_run_manifest_${TARGET_REPORT_DATE}_${TARGET_RUN_ID}.json" \
            --write-gate "output/quality/etf_eu_routine_package_readiness_${TARGET_RUN_ID}.json" \
            --pdf-client-grade-gate "output/quality/etf_eu_routine_pdf_client_grade_${TARGET_RUN_ID}.json" \
            --pdf-visual-review "output/quality/etf_eu_routine_pdf_visual_review_${TARGET_RUN_ID}.json"

      - id: close_preview
        name: Close preview as accepted and ready
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          run_id = os.environ["TARGET_RUN_ID"]
          path = Path(f"output/run_manifests/etf_eu_routine_preview_manifest_{run_id}.json")
          payload = json.loads(path.read_text(encoding="utf-8"))
          payload.update(
              {
                  "status": "machine_and_visual_validation_passed_ready_for_controlled_delivery",
                  "visual_review_pending": False,
                  "visual_review_artifact": f"output/quality/etf_eu_routine_pdf_visual_review_{run_id}.json",
                  "package_readiness_gate": f"output/quality/etf_eu_routine_package_readiness_{run_id}.json",
                  "client_grade_preview_accepted": True,
                  "ready_for_controlled_delivery": True,
                  "delivery_authorized": False,
                  "production_delivery_authority": False,
                  "transport_attempted": False,
                  "send_executed": False,
                  "receipt_confirmed": False,
              }
          )
          path.write_text(json.dumps(payload, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          PY

      - id: persist
        name: Persist readiness evidence
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            "output/fresh_generation/etf_eu_fresh_generation_package_manifest_${TARGET_RUN_ID}.json" \
            "output/fresh_generation/etf_eu_ready_for_controlled_delivery_${TARGET_RUN_ID}.json" \
            "output/run_manifests/etf_eu_routine_run_manifest_${TARGET_REPORT_DATE}_${TARGET_RUN_ID}.json" \
            "output/run_manifests/etf_eu_routine_preview_manifest_${TARGET_RUN_ID}.json" \
            "output/quality/etf_eu_routine_package_readiness_${TARGET_RUN_ID}.json"
          git commit -m "Close ETF EU package readiness ${TARGET_RUN_ID} [skip ci]"
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Persist readiness attempt diagnostic
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          REGRESSION_OUTCOME: ${{ steps.regression.outcome }}
          METADATA_OUTCOME: ${{ steps.metadata.outcome }}
          READINESS_OUTCOME: ${{ steps.readiness.outcome }}
          CLOSE_OUTCOME: ${{ steps.close_preview.outcome }}
          PERSIST_OUTCOME: ${{ steps.persist.outcome }}
          HELPER_RUN_ID: ${{ github.run_id }}
          SOURCE_RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          set -euo pipefail
          git fetch origin main
          git reset --hard origin/main
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          target = os.environ["TARGET_RUN_ID"]
          payload = {
              "schema_version": "etf_eu_readiness_attempt_v1",
              "artifact_type": "etf_eu_readiness_attempt",
              "target_run_id": target,
              "helper_workflow_run_id": int(os.environ["HELPER_RUN_ID"]),
              "source_workflow_run_id": int(os.environ["SOURCE_RUN_ID"]),
              "job_status": os.environ["JOB_STATUS"],
              "regression_outcome": os.environ["REGRESSION_OUTCOME"],
              "metadata_outcome": os.environ["METADATA_OUTCOME"],
              "readiness_outcome": os.environ["READINESS_OUTCOME"],
              "close_outcome": os.environ["CLOSE_OUTCOME"],
              "persist_outcome": os.environ["PERSIST_OUTCOME"],
          }
          path = Path(f"output/run_manifests/etf_eu_readiness_attempt_{target}.json")
          path.parent.mkdir(parents=True, exist_ok=True)
          path.write_text(json.dumps(payload, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "output/run_manifests/etf_eu_readiness_attempt_${TARGET_RUN_ID}.json"
          git commit -m "Persist ETF EU readiness attempt ${TARGET_RUN_ID} [skip ci]"
          git pull --rebase origin main
          git push origin HEAD:main
