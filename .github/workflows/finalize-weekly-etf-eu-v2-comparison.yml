name: Finalize Weekly ETF EU v2 comparison

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "control/run_queue/etf_eu_finalize_v2_comparison_request_*.md"

permissions:
  actions: read
  contents: read

jobs:
  finalize-comparison:
    runs-on: ubuntu-latest
    env:
      SOURCE_WORKFLOW_RUN_ID: "29455425268"
      SOURCE_ARTIFACT_NAME: "etf-eu-current-date-v2-comparison-20260715_213100"
      RUN_ID: "20260715_213100"
      REPORT_DATE: "2026-07-15"
      REPORT_SUFFIX: "260715"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PDF inspection dependency
        run: sudo apt-get update && sudo apt-get install -y poppler-utils

      - name: Download validated current-date comparison bundle
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.SOURCE_ARTIFACT_NAME }}
          path: downloaded
          github-token: ${{ github.token }}
          run-id: ${{ env.SOURCE_WORKFLOW_RUN_ID }}

      - name: Run corrected comparison contract in strict mode
        run: |
          set -euo pipefail
          ROOT="downloaded"
          BASE="${ROOT}/current_date_comparison/${RUN_ID}"
          python tools/compare_etf_eu_production_and_v2.py \
            --run-id "$RUN_ID" \
            --report-date "$REPORT_DATE" \
            --report-suffix "$REPORT_SUFFIX" \
            --pricing-artifact "${ROOT}/pricing/ucits_close_price_validation_basket_results_${RUN_ID}.json" \
            --macro-artifact "${BASE}/macro/etf_eu_macro_policy_pack_${RUN_ID}.json" \
            --valuation-history "${BASE}/state/etf_eu_valuation_history.csv" \
            --v2-state "${BASE}/v2/etf_eu_client_grade_report_state_${RUN_ID}.json" \
            --v2-validation "${BASE}/v2/etf_eu_client_grade_v2_validation_${RUN_ID}.json" \
            --legacy-dutch-pdf "${BASE}/production/weekly_etf_eu_review_nl_${REPORT_SUFFIX}.pdf" \
            --legacy-english-pdf "${BASE}/production/weekly_etf_eu_review_${REPORT_SUFFIX}.pdf" \
            --v2-dutch-pdf "${BASE}/v2/weekly_etf_eu_client_grade_nl_${REPORT_SUFFIX}.pdf" \
            --v2-english-pdf "${BASE}/v2/weekly_etf_eu_client_grade_${REPORT_SUFFIX}.pdf" \
            --output "${BASE}/etf_eu_production_v2_comparison_final_${RUN_ID}.json" \
            --strict

      - name: Upload final comparison evidence
        uses: actions/upload-artifact@v4
        with:
          name: etf-eu-v2-final-comparison-${{ env.RUN_ID }}
          path: |
            downloaded/current_date_comparison/${{ env.RUN_ID }}/etf_eu_production_v2_comparison_final_${{ env.RUN_ID }}.json
            downloaded/current_date_comparison/${{ env.RUN_ID }}/v2/etf_eu_client_grade_v2_validation_${{ env.RUN_ID }}.json
            downloaded/current_date_comparison/${{ env.RUN_ID }}/v2/weekly_etf_eu_client_grade_nl_${{ env.REPORT_SUFFIX }}.pdf
            downloaded/current_date_comparison/${{ env.RUN_ID }}/v2/weekly_etf_eu_client_grade_${{ env.REPORT_SUFFIX }}.pdf
