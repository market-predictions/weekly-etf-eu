name: Weekly ETF EU client-grade v2 preview

on:
  workflow_dispatch:
    inputs:
      preview_run_id:
        required: true
        default: "20260715_190000"
      source_run_id:
        required: true
        default: "20260712_125000"
      report_date:
        required: true
        default: "2026-07-12"
      report_suffix:
        required: true
        default: "260712"
      pricing_artifact:
        required: true
        default: "output/pricing/ucits_close_price_validation_basket_results_20260712_125000.json"
  push:
    paths:
      - "control/run_queue/etf_eu_client_grade_v2_preview_request_*.md"
  pull_request:
    paths:
      - "control/run_queue/etf_eu_client_grade_v2_preview_request_*.md"

permissions:
  contents: write

jobs:
  client-grade-v2-preview:
    runs-on: ubuntu-latest
    env:
      PREVIEW_RUN_ID: ${{ github.event.inputs.preview_run_id || '20260715_190000' }}
      SOURCE_RUN_ID: ${{ github.event.inputs.source_run_id || '20260712_125000' }}
      REPORT_DATE: ${{ github.event.inputs.report_date || '2026-07-12' }}
      REPORT_SUFFIX: ${{ github.event.inputs.report_suffix || '260712' }}
      PRICING_ARTIFACT: ${{ github.event.inputs.pricing_artifact || 'output/pricing/ucits_close_price_validation_basket_results_20260712_125000.json' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install preview dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcairo2 \
            libpango-1.0-0 \
            libgdk-pixbuf-2.0-0 \
            libffi-dev \
            shared-mime-info \
            fonts-liberation \
            fonts-dejavu-core \
            fonts-lato \
            poppler-utils
          python -m pip install --upgrade pip
          pip install pyyaml weasyprint pytest

      - name: Build normalized EU report state
        run: |
          set -euo pipefail
          python -m runtime.build_etf_eu_client_grade_report_state \
            --portfolio-state output/etf_eu_portfolio_state.json \
            --valuation-history output/etf_eu_valuation_history.csv \
            --pricing-artifact "$PRICING_ARTIFACT" \
            --macro-pack output/macro/latest.json \
            --registry config/ucits_symbol_registry.yml \
            --run-id "$PREVIEW_RUN_ID" \
            --source-run-id "$SOURCE_RUN_ID" \
            --report-date "$REPORT_DATE" \
            --report-suffix "$REPORT_SUFFIX" \
            --output "output/runtime/etf_eu_client_grade_report_state_${PREVIEW_RUN_ID}.json"

      - name: Record focused report-contract tests
        run: |
          set +e
          mkdir -p output/quality
          pytest -q tests/test_etf_eu_client_grade_report_v2.py > "output/quality/etf_eu_client_grade_v2_test_${PREVIEW_RUN_ID}.log" 2>&1
          STATUS=$?
          cat "output/quality/etf_eu_client_grade_v2_test_${PREVIEW_RUN_ID}.log"
          printf '{"test_exit_code": %s, "blocking": false}\n' "$STATUS" > "output/quality/etf_eu_client_grade_v2_test_${PREVIEW_RUN_ID}.json"
          exit 0

      - name: Render Dutch and English client-grade previews
        run: |
          set -euo pipefail
          PREVIEW_DIR="output/client_grade_preview/${PREVIEW_RUN_ID}"
          STATE="output/runtime/etf_eu_client_grade_report_state_${PREVIEW_RUN_ID}.json"
          mkdir -p "$PREVIEW_DIR"
          python -m runtime.render_etf_eu_client_grade_v2 \
            --state "$STATE" \
            --language nl \
            --html-output "${PREVIEW_DIR}/weekly_etf_eu_client_grade_nl_${REPORT_SUFFIX}.html" \
            --pdf-output "${PREVIEW_DIR}/weekly_etf_eu_client_grade_nl_${REPORT_SUFFIX}.pdf"
          python -m runtime.render_etf_eu_client_grade_v2 \
            --state "$STATE" \
            --language en \
            --html-output "${PREVIEW_DIR}/weekly_etf_eu_client_grade_${REPORT_SUFFIX}.html" \
            --pdf-output "${PREVIEW_DIR}/weekly_etf_eu_client_grade_${REPORT_SUFFIX}.pdf"

      - name: Apply bilingual editorial polish
        run: |
          set -euo pipefail
          PREVIEW_DIR="output/client_grade_preview/${PREVIEW_RUN_ID}"
          python -m runtime.polish_etf_eu_client_grade_html \
            --html "${PREVIEW_DIR}/weekly_etf_eu_client_grade_nl_${REPORT_SUFFIX}.html" \
            --language nl \
            --pdf "${PREVIEW_DIR}/weekly_etf_eu_client_grade_nl_${REPORT_SUFFIX}.pdf"
          python -m runtime.polish_etf_eu_client_grade_html \
            --html "${PREVIEW_DIR}/weekly_etf_eu_client_grade_${REPORT_SUFFIX}.html" \
            --language en \
            --pdf "${PREVIEW_DIR}/weekly_etf_eu_client_grade_${REPORT_SUFFIX}.pdf"

      - name: Validate client-grade product contract
        run: |
          set -euo pipefail
          PREVIEW_DIR="output/client_grade_preview/${PREVIEW_RUN_ID}"
          python tools/validate_etf_eu_client_grade_report_v2.py \
            --state "output/runtime/etf_eu_client_grade_report_state_${PREVIEW_RUN_ID}.json" \
            --dutch-html "${PREVIEW_DIR}/weekly_etf_eu_client_grade_nl_${REPORT_SUFFIX}.html" \
            --dutch-pdf "${PREVIEW_DIR}/weekly_etf_eu_client_grade_nl_${REPORT_SUFFIX}.pdf" \
            --english-html "${PREVIEW_DIR}/weekly_etf_eu_client_grade_${REPORT_SUFFIX}.html" \
            --english-pdf "${PREVIEW_DIR}/weekly_etf_eu_client_grade_${REPORT_SUFFIX}.pdf" \
            --output "output/quality/etf_eu_client_grade_v2_validation_${PREVIEW_RUN_ID}.json"

      - name: Render page-review images
        run: |
          set -euo pipefail
          PREVIEW_DIR="output/client_grade_preview/${PREVIEW_RUN_ID}"
          python tools/render_etf_eu_pdf_review_pages.py \
            --pdf "${PREVIEW_DIR}/weekly_etf_eu_client_grade_nl_${REPORT_SUFFIX}.pdf" \
            --output-dir "${PREVIEW_DIR}/pages/nl" \
            --write-index "${PREVIEW_DIR}/pages/nl/index.json"
          python tools/render_etf_eu_pdf_review_pages.py \
            --pdf "${PREVIEW_DIR}/weekly_etf_eu_client_grade_${REPORT_SUFFIX}.pdf" \
            --output-dir "${PREVIEW_DIR}/pages/en" \
            --write-index "${PREVIEW_DIR}/pages/en/index.json"

      - name: Upload integrated preview
        uses: actions/upload-artifact@v4
        with:
          name: etf-eu-client-grade-v2-${{ env.PREVIEW_RUN_ID }}
          path: |
            output/runtime/etf_eu_client_grade_report_state_${{ env.PREVIEW_RUN_ID }}.json
            output/client_grade_preview/${{ env.PREVIEW_RUN_ID }}
            output/quality/etf_eu_client_grade_v2_*

      - name: Persist preview and evidence
        if: github.event_name != 'pull_request'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f \
            "output/runtime/etf_eu_client_grade_report_state_${PREVIEW_RUN_ID}.json" \
            "output/client_grade_preview/${PREVIEW_RUN_ID}" \
            output/quality/etf_eu_client_grade_v2_*
          git commit -m "Persist ETF EU client-grade v2 preview ${PREVIEW_RUN_ID} [skip ci]"
          git push origin HEAD:main
