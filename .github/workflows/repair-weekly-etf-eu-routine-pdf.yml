name: Weekly ETF EU routine PDF repair preview

on:
  workflow_dispatch:
    inputs:
      source_run_id:
        description: "Source routine run id"
        required: true
        default: "20260712_125000"
      repair_run_id:
        description: "PDF repair preview run id"
        required: true
        default: "20260712_200000"
      report_suffix:
        description: "Existing report suffix"
        required: true
        default: "260712"

permissions:
  contents: write

jobs:
  repair-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system PDF packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcairo2 \
            libpango-1.0-0 \
            libgdk-pixbuf-2.0-0 \
            libffi-dev \
            shared-mime-info \
            fonts-liberation \
            fonts-dejavu-core \
            fonts-lato \
            poppler-utils

      - name: Install Python render dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mistune weasyprint pyyaml

      - name: Render corrected Dutch and English previews
        env:
          SOURCE_RUN_ID: ${{ inputs.source_run_id }}
          REPAIR_RUN_ID: ${{ inputs.repair_run_id }}
          REPORT_SUFFIX: ${{ inputs.report_suffix }}
        run: |
          set -euo pipefail
          PREVIEW_DIR="output/repair_preview/${REPAIR_RUN_ID}"
          mkdir -p "$PREVIEW_DIR" output/quality
          python -m runtime.render_etf_eu_client_report \
            --markdown "output/fresh_generation/weekly_etf_eu_review_nl_${REPORT_SUFFIX}.md" \
            --html-output "${PREVIEW_DIR}/weekly_etf_eu_review_nl_${REPORT_SUFFIX}.html" \
            --pdf-output "${PREVIEW_DIR}/weekly_etf_eu_review_nl_${REPORT_SUFFIX}.pdf" \
            --language nl \
            --title "Weekly ETF EU Review | Nederlands | 2026-07-12"
          python -m runtime.render_etf_eu_client_report \
            --markdown "output/fresh_generation/weekly_etf_eu_review_${REPORT_SUFFIX}.md" \
            --html-output "${PREVIEW_DIR}/weekly_etf_eu_review_${REPORT_SUFFIX}.html" \
            --pdf-output "${PREVIEW_DIR}/weekly_etf_eu_review_${REPORT_SUFFIX}.pdf" \
            --language en \
            --title "Weekly ETF EU Review | English Companion | 2026-07-12"

      - name: Validate client-grade PDF machine contract
        env:
          SOURCE_RUN_ID: ${{ inputs.source_run_id }}
          REPAIR_RUN_ID: ${{ inputs.repair_run_id }}
          REPORT_SUFFIX: ${{ inputs.report_suffix }}
        run: |
          set -euo pipefail
          PREVIEW_DIR="output/repair_preview/${REPAIR_RUN_ID}"
          python tools/validate_etf_eu_routine_pdf_client_grade.py \
            --pdf "${PREVIEW_DIR}/weekly_etf_eu_review_nl_${REPORT_SUFFIX}.pdf" \
            --html "${PREVIEW_DIR}/weekly_etf_eu_review_nl_${REPORT_SUFFIX}.html" \
            --markdown "output/fresh_generation/weekly_etf_eu_review_nl_${REPORT_SUFFIX}.md" \
            --language nl \
            --repair-run-id "$REPAIR_RUN_ID" \
            --source-run-id "$SOURCE_RUN_ID" \
            --write-result "output/quality/etf_eu_routine_pdf_client_grade_${REPAIR_RUN_ID}_nl.json"
          python tools/validate_etf_eu_routine_pdf_client_grade.py \
            --pdf "${PREVIEW_DIR}/weekly_etf_eu_review_${REPORT_SUFFIX}.pdf" \
            --html "${PREVIEW_DIR}/weekly_etf_eu_review_${REPORT_SUFFIX}.html" \
            --markdown "output/fresh_generation/weekly_etf_eu_review_${REPORT_SUFFIX}.md" \
            --language en \
            --repair-run-id "$REPAIR_RUN_ID" \
            --source-run-id "$SOURCE_RUN_ID" \
            --write-result "output/quality/etf_eu_routine_pdf_client_grade_${REPAIR_RUN_ID}_en.json"
          python - "$SOURCE_RUN_ID" "$REPAIR_RUN_ID" <<'PY'
          import json
          import sys
          from datetime import datetime, timezone
          from pathlib import Path

          source_run_id, repair_run_id = sys.argv[1:3]
          base = Path("output/quality")
          nl = json.loads((base / f"etf_eu_routine_pdf_client_grade_{repair_run_id}_nl.json").read_text())
          en = json.loads((base / f"etf_eu_routine_pdf_client_grade_{repair_run_id}_en.json").read_text())
          payload = {
              "schema_version": "etf_eu_routine_pdf_client_grade_combined_v1",
              "artifact_type": "etf_eu_routine_pdf_client_grade_combined",
              "generated_at_utc": datetime.now(timezone.utc).replace(microsecond=0).isoformat().replace("+00:00", "Z"),
              "source_run_id": source_run_id,
              "repair_run_id": repair_run_id,
              "dutch_artifact": str(base / f"etf_eu_routine_pdf_client_grade_{repair_run_id}_nl.json"),
              "english_artifact": str(base / f"etf_eu_routine_pdf_client_grade_{repair_run_id}_en.json"),
              "dutch_pdf_client_grade_passed": nl["machine_validation_passed"],
              "english_pdf_client_grade_passed": en["machine_validation_passed"],
              "pdf_client_grade_passed": nl["machine_validation_passed"] and en["machine_validation_passed"],
              "blockers": nl["blockers"] + en["blockers"],
              "warnings": nl["warnings"] + en["warnings"],
          }
          (base / f"etf_eu_routine_pdf_client_grade_{repair_run_id}.json").write_text(
              json.dumps(payload, indent=2, sort_keys=True) + "\n", encoding="utf-8"
          )
          if payload["pdf_client_grade_passed"] is not True:
              raise SystemExit(1)
          PY

      - name: Render first middle and last pages
        env:
          SOURCE_RUN_ID: ${{ inputs.source_run_id }}
          REPAIR_RUN_ID: ${{ inputs.repair_run_id }}
          REPORT_SUFFIX: ${{ inputs.report_suffix }}
        run: |
          set -euo pipefail
          PREVIEW_DIR="output/repair_preview/${REPAIR_RUN_ID}"
          python tools/render_etf_eu_pdf_review_pages.py \
            --pdf "${PREVIEW_DIR}/weekly_etf_eu_review_nl_${REPORT_SUFFIX}.pdf" \
            --output-dir "${PREVIEW_DIR}/pages/nl" \
            --write-index "${PREVIEW_DIR}/pages/nl/index.json"
          python tools/render_etf_eu_pdf_review_pages.py \
            --pdf "${PREVIEW_DIR}/weekly_etf_eu_review_${REPORT_SUFFIX}.pdf" \
            --output-dir "${PREVIEW_DIR}/pages/en" \
            --write-index "${PREVIEW_DIR}/pages/en/index.json"
          python - "$SOURCE_RUN_ID" "$REPAIR_RUN_ID" "$REPORT_SUFFIX" <<'PY'
          import json
          import sys
          from datetime import datetime, timezone
          from pathlib import Path

          source_run_id, repair_run_id, report_suffix = sys.argv[1:4]
          preview = Path("output/repair_preview") / repair_run_id
          nl = json.loads((preview / "pages/nl/index.json").read_text())
          en = json.loads((preview / "pages/en/index.json").read_text())
          payload = {
              "schema_version": "etf_eu_routine_pdf_visual_review_v1",
              "artifact_type": "etf_eu_routine_pdf_visual_review",
              "generated_at_utc": datetime.now(timezone.utc).replace(microsecond=0).isoformat().replace("+00:00", "Z"),
              "repair_run_id": repair_run_id,
              "source_run_id": source_run_id,
              "dutch_pdf": str(preview / f"weekly_etf_eu_review_nl_{report_suffix}.pdf"),
              "english_pdf": str(preview / f"weekly_etf_eu_review_{report_suffix}.pdf"),
              "dutch_page_count": nl["page_count"],
              "english_page_count": en["page_count"],
              "dutch_pages_reviewed": [],
              "english_pages_reviewed": [],
              "first_page_reviewed": False,
              "middle_page_reviewed": False,
              "last_page_reviewed": False,
              "no_right_edge_clipping": False,
              "no_bottom_clipping": False,
              "no_overlapping_text": False,
              "tables_readable": False,
              "headings_readable": False,
              "unicode_correct": False,
              "all_sections_visible": False,
              "duplicate_title_absent": False,
              "visual_review_passed": False,
              "review_notes": ["Rendered first, middle and last pages are ready for explicit visual inspection."],
              "blockers": ["manual visual inspection required before corrected resend"],
          }
          out = Path("output/quality") / f"etf_eu_routine_pdf_visual_review_{repair_run_id}.json"
          out.write_text(json.dumps(payload, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          PY

      - name: Upload repair preview for review
        uses: actions/upload-artifact@v4
        with:
          name: etf-eu-pdf-repair-${{ inputs.repair_run_id }}
          path: |
            output/repair_preview/${{ inputs.repair_run_id }}
            output/quality/etf_eu_routine_pdf_client_grade_${{ inputs.repair_run_id }}*.json
            output/quality/etf_eu_routine_pdf_visual_review_${{ inputs.repair_run_id }}.json

      - name: Persist repair preview and QA evidence
        env:
          REPAIR_RUN_ID: ${{ inputs.repair_run_id }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f \
            "output/repair_preview/${REPAIR_RUN_ID}" \
            "output/quality/etf_eu_routine_pdf_client_grade_${REPAIR_RUN_ID}_nl.json" \
            "output/quality/etf_eu_routine_pdf_client_grade_${REPAIR_RUN_ID}_en.json" \
            "output/quality/etf_eu_routine_pdf_client_grade_${REPAIR_RUN_ID}.json" \
            "output/quality/etf_eu_routine_pdf_visual_review_${REPAIR_RUN_ID}.json"
          git commit -m "Persist ETF EU client-grade PDF repair preview ${REPAIR_RUN_ID} [skip ci]"
          git push origin HEAD:main
