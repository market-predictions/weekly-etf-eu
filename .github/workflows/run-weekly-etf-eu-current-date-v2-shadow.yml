name: Weekly ETF EU current-date production and v2 shadow

on:
  workflow_dispatch:
    inputs:
      run_id:
        required: true
        default: "20260715_213100"
      report_date:
        required: true
        default: "2026-07-15"
      report_suffix:
        required: true
        default: "260715"
  pull_request:
    paths:
      - "control/run_queue/etf_eu_current_date_v2_shadow_request_*.md"

permissions:
  contents: read

jobs:
  current-date-shadow:
    runs-on: ubuntu-latest
    env:
      RUN_ID: ${{ github.event.inputs.run_id || '20260715_213100' }}
      REPORT_DATE: ${{ github.event.inputs.report_date || '2026-07-15' }}
      REPORT_SUFFIX: ${{ github.event.inputs.report_suffix || '260715' }}
      DONOR_MACRO_URL: "https://raw.githubusercontent.com/market-predictions/weekly-etf/main/output/macro/latest.json"
      PREVIOUS_ROUTINE_MANIFEST: "output/run_manifests/etf_eu_routine_run_manifest_2026-07-12_20260712_125000.json"
      PREVIOUS_CLOSEOUT: "output/delivery_control/etf_eu_corrected_delivery_closeout_20260713_180000.json"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pricing and render dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2 libpango-1.0-0 libgdk-pixbuf-2.0-0 libffi-dev shared-mime-info fonts-liberation fonts-dejavu-core fonts-lato poppler-utils
          python -m pip install --upgrade pip
          pip install pyyaml yfinance mistune weasyprint

      - name: Refresh current donor macro context for EU
        run: |
          set -euo pipefail
          mkdir -p "output/current_date_comparison/${RUN_ID}/macro"
          python -m runtime.adapt_weekly_etf_macro_for_eu \
            --source-url "$DONOR_MACRO_URL" \
            --report-date "$REPORT_DATE" \
            --run-id "$RUN_ID" \
            --output "output/current_date_comparison/${RUN_ID}/macro/etf_eu_macro_policy_pack_${RUN_ID}.json" \
            --latest-output "output/current_date_comparison/${RUN_ID}/macro/latest.json"

      - name: Refresh current UCITS pricing
        run: |
          set -euo pipefail
          python pricing/build_ucits_close_price_validation_basket_results.py \
            --run-id "$RUN_ID" \
            --pause-seconds 5 \
            --rate-limit-cooldown-seconds 120 \
            --max-attempts 2 \
            --rate-limit-mode stop
          python tools/validate_ucits_close_price_validation_basket_results.py \
            --artifact "output/pricing/ucits_close_price_validation_basket_results_${RUN_ID}.json"

      - name: Refresh valuation history from current EU portfolio state
        run: |
          set -euo pipefail
          mkdir -p "output/current_date_comparison/${RUN_ID}/state"
          python tools/update_etf_eu_valuation_history.py \
            --portfolio-state output/etf_eu_portfolio_state.json \
            --history output/etf_eu_valuation_history.csv \
            --report-date "$REPORT_DATE" \
            --source-report "current-date-shadow-${RUN_ID}" \
            --comment "Validated current-date EU/UCITS shadow observation" \
            --output "output/current_date_comparison/${RUN_ID}/state/etf_eu_valuation_history.csv"

      - name: Generate current production-format report
        run: |
          set -euo pipefail
          LEGACY_DIR="output/current_date_comparison/${RUN_ID}/production"
          python -m tools.build_etf_eu_routine_report_package \
            --run-id "$RUN_ID" \
            --report-date "$REPORT_DATE" \
            --report-suffix "$REPORT_SUFFIX" \
            --pricing-artifact "output/pricing/ucits_close_price_validation_basket_results_${RUN_ID}.json" \
            --output-dir "$LEGACY_DIR" \
            --portfolio-state output/etf_eu_portfolio_state.json \
            --valuation-history "output/current_date_comparison/${RUN_ID}/state/etf_eu_valuation_history.csv" \
            --trade-ledger output/etf_eu_trade_ledger.csv \
            --recommendation-scorecard output/etf_eu_recommendation_scorecard.csv \
            --previous-routine-manifest "$PREVIOUS_ROUTINE_MANIFEST" \
            --previous-delivery-closeout-manifest "$PREVIOUS_CLOSEOUT"
          set +e
          python tools/validate_etf_eu_routine_pdf_client_grade.py \
            --pdf "${LEGACY_DIR}/weekly_etf_eu_review_nl_${REPORT_SUFFIX}.pdf" \
            --html "${LEGACY_DIR}/weekly_etf_eu_review_nl_${REPORT_SUFFIX}.html" \
            --markdown "${LEGACY_DIR}/weekly_etf_eu_review_nl_${REPORT_SUFFIX}.md" \
            --language nl \
            --repair-run-id "$RUN_ID" \
            --source-run-id "$RUN_ID" \
            --write-result "output/current_date_comparison/${RUN_ID}/production/validation_nl.json"
          NL_STATUS=$?
          python tools/validate_etf_eu_routine_pdf_client_grade.py \
            --pdf "${LEGACY_DIR}/weekly_etf_eu_review_${REPORT_SUFFIX}.pdf" \
            --html "${LEGACY_DIR}/weekly_etf_eu_review_${REPORT_SUFFIX}.html" \
            --markdown "${LEGACY_DIR}/weekly_etf_eu_review_${REPORT_SUFFIX}.md" \
            --language en \
            --repair-run-id "$RUN_ID" \
            --source-run-id "$RUN_ID" \
            --write-result "output/current_date_comparison/${RUN_ID}/production/validation_en.json"
          EN_STATUS=$?
          printf '{"legacy_validation_diagnostic": true, "dutch_exit_code": %s, "english_exit_code": %s}\n' "$NL_STATUS" "$EN_STATUS" > "${LEGACY_DIR}/validation_summary.json"
          exit 0

      - name: Build current client-grade v2 state
        run: |
          set -euo pipefail
          mkdir -p "output/current_date_comparison/${RUN_ID}/v2"
          python -m runtime.build_etf_eu_client_grade_report_state \
            --portfolio-state output/etf_eu_portfolio_state.json \
            --valuation-history "output/current_date_comparison/${RUN_ID}/state/etf_eu_valuation_history.csv" \
            --pricing-artifact "output/pricing/ucits_close_price_validation_basket_results_${RUN_ID}.json" \
            --macro-pack "output/current_date_comparison/${RUN_ID}/macro/etf_eu_macro_policy_pack_${RUN_ID}.json" \
            --registry config/ucits_symbol_registry.yml \
            --run-id "$RUN_ID" \
            --source-run-id "$RUN_ID" \
            --report-date "$REPORT_DATE" \
            --report-suffix "$REPORT_SUFFIX" \
            --output "output/current_date_comparison/${RUN_ID}/v2/etf_eu_client_grade_report_state_${RUN_ID}.json"

      - name: Render and validate current client-grade v2
        run: |
          set -euo pipefail
          V2_DIR="output/current_date_comparison/${RUN_ID}/v2"
          STATE="${V2_DIR}/etf_eu_client_grade_report_state_${RUN_ID}.json"
          python -m runtime.render_etf_eu_client_grade_v2 \
            --state "$STATE" \
            --language nl \
            --html-output "${V2_DIR}/weekly_etf_eu_client_grade_nl_${REPORT_SUFFIX}.html" \
            --pdf-output "${V2_DIR}/weekly_etf_eu_client_grade_nl_${REPORT_SUFFIX}.pdf"
          python -m runtime.render_etf_eu_client_grade_v2 \
            --state "$STATE" \
            --language en \
            --html-output "${V2_DIR}/weekly_etf_eu_client_grade_${REPORT_SUFFIX}.html" \
            --pdf-output "${V2_DIR}/weekly_etf_eu_client_grade_${REPORT_SUFFIX}.pdf"
          python -m runtime.polish_etf_eu_client_grade_html \
            --html "${V2_DIR}/weekly_etf_eu_client_grade_nl_${REPORT_SUFFIX}.html" \
            --language nl \
            --pdf "${V2_DIR}/weekly_etf_eu_client_grade_nl_${REPORT_SUFFIX}.pdf"
          python -m runtime.polish_etf_eu_client_grade_html \
            --html "${V2_DIR}/weekly_etf_eu_client_grade_${REPORT_SUFFIX}.html" \
            --language en \
            --pdf "${V2_DIR}/weekly_etf_eu_client_grade_${REPORT_SUFFIX}.pdf"
          python tools/validate_etf_eu_client_grade_report_v2.py \
            --state "$STATE" \
            --dutch-html "${V2_DIR}/weekly_etf_eu_client_grade_nl_${REPORT_SUFFIX}.html" \
            --dutch-pdf "${V2_DIR}/weekly_etf_eu_client_grade_nl_${REPORT_SUFFIX}.pdf" \
            --english-html "${V2_DIR}/weekly_etf_eu_client_grade_${REPORT_SUFFIX}.html" \
            --english-pdf "${V2_DIR}/weekly_etf_eu_client_grade_${REPORT_SUFFIX}.pdf" \
            --output "${V2_DIR}/etf_eu_client_grade_v2_validation_${RUN_ID}.json" \
            --strict

      - name: Compare production and v2 from identical current inputs
        run: |
          set -euo pipefail
          LEGACY_DIR="output/current_date_comparison/${RUN_ID}/production"
          V2_DIR="output/current_date_comparison/${RUN_ID}/v2"
          python tools/compare_etf_eu_production_and_v2.py \
            --run-id "$RUN_ID" \
            --report-date "$REPORT_DATE" \
            --report-suffix "$REPORT_SUFFIX" \
            --pricing-artifact "output/pricing/ucits_close_price_validation_basket_results_${RUN_ID}.json" \
            --macro-artifact "output/current_date_comparison/${RUN_ID}/macro/etf_eu_macro_policy_pack_${RUN_ID}.json" \
            --valuation-history "output/current_date_comparison/${RUN_ID}/state/etf_eu_valuation_history.csv" \
            --v2-state "${V2_DIR}/etf_eu_client_grade_report_state_${RUN_ID}.json" \
            --v2-validation "${V2_DIR}/etf_eu_client_grade_v2_validation_${RUN_ID}.json" \
            --legacy-dutch-pdf "${LEGACY_DIR}/weekly_etf_eu_review_nl_${REPORT_SUFFIX}.pdf" \
            --legacy-english-pdf "${LEGACY_DIR}/weekly_etf_eu_review_${REPORT_SUFFIX}.pdf" \
            --v2-dutch-pdf "${V2_DIR}/weekly_etf_eu_client_grade_nl_${REPORT_SUFFIX}.pdf" \
            --v2-english-pdf "${V2_DIR}/weekly_etf_eu_client_grade_${REPORT_SUFFIX}.pdf" \
            --output "output/current_date_comparison/${RUN_ID}/etf_eu_production_v2_comparison_${RUN_ID}.json" \
            --strict

      - name: Render complete visual comparison pages
        run: |
          set -euo pipefail
          BASE="output/current_date_comparison/${RUN_ID}"
          mkdir -p "$BASE/pages/production/nl" "$BASE/pages/production/en" "$BASE/pages/v2/nl" "$BASE/pages/v2/en"
          pdftoppm -png -r 120 "$BASE/production/weekly_etf_eu_review_nl_${REPORT_SUFFIX}.pdf" "$BASE/pages/production/nl/page"
          pdftoppm -png -r 120 "$BASE/production/weekly_etf_eu_review_${REPORT_SUFFIX}.pdf" "$BASE/pages/production/en/page"
          pdftoppm -png -r 120 "$BASE/v2/weekly_etf_eu_client_grade_nl_${REPORT_SUFFIX}.pdf" "$BASE/pages/v2/nl/page"
          pdftoppm -png -r 120 "$BASE/v2/weekly_etf_eu_client_grade_${REPORT_SUFFIX}.pdf" "$BASE/pages/v2/en/page"

      - name: Upload current-date production and v2 comparison
        uses: actions/upload-artifact@v4
        with:
          name: etf-eu-current-date-v2-comparison-${{ env.RUN_ID }}
          path: |
            output/pricing/ucits_close_price_validation_basket_results_${{ env.RUN_ID }}.json
            output/current_date_comparison/${{ env.RUN_ID }}
