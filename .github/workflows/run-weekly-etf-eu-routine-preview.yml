name: ETF EU - Generate and Validate Preview (NO EMAIL)

on:
  push:
    branches:
      - main
    paths:
      - "control/run_queue/etf_eu_routine_preview_request_*.md"
  workflow_dispatch:
    inputs:
      request_path:
        description: "Prepared non-delivery routine preview request"
        required: true

permissions:
  contents: write

jobs:
  generate-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PDF and Python dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y libcairo2 libpango-1.0-0 libgdk-pixbuf-2.0-0 libffi-dev shared-mime-info fonts-liberation fonts-dejavu-core fonts-lato poppler-utils
          python -m pip install --upgrade pip
          python -m pip install pyyaml yfinance mistune weasyprint pytest

      - name: Resolve broker-neutral non-delivery request
        run: |
          set -euo pipefail
          REQUEST_PATH="${{ github.event.inputs.request_path || '' }}"
          if [ -z "$REQUEST_PATH" ]; then
            REQUEST_PATH="$(git diff-tree --no-commit-id --name-only -r HEAD | grep '^control/run_queue/etf_eu_routine_preview_request_.*\.md$' | head -1 || true)"
          fi
          test -n "$REQUEST_PATH" && test -f "$REQUEST_PATH"
          python - "$REQUEST_PATH" <<'PY'
          import re
          import sys
          from datetime import date
          from pathlib import Path

          path = Path(sys.argv[1])
          data = {}
          for raw in path.read_text(encoding="utf-8").splitlines():
              raw = raw.strip()
              if raw and not raw.startswith("#") and "=" in raw:
                  key, value = raw.split("=", 1)
                  data[key.strip()] = value.strip()
          required = {
              "schema_version", "artifact_type", "run_id", "report_date", "report_suffix",
              "previous_routine_manifest", "previous_delivery_closeout_manifest",
              "execution_mode", "send_confirmation", "production_delivery_authority",
          }
          missing = sorted(required - set(data))
          if missing:
              raise SystemExit("ETF_EU_ROUTINE_PREVIEW_REQUEST_MISSING:" + ",".join(missing))
          if data["schema_version"] != "etf_eu_routine_preview_request_v1":
              raise SystemExit("ETF_EU_ROUTINE_PREVIEW_SCHEMA_INVALID")
          if data["artifact_type"] != "etf_eu_routine_preview_request":
              raise SystemExit("ETF_EU_ROUTINE_PREVIEW_TYPE_INVALID")
          if data["execution_mode"] != "generate_validate_only":
              raise SystemExit("ETF_EU_ROUTINE_PREVIEW_MODE_INVALID")
          if data["send_confirmation"] != "not_confirmed" or data["production_delivery_authority"] != "false":
              raise SystemExit("ETF_EU_ROUTINE_PREVIEW_DELIVERY_AUTHORITY_INVALID")
          if not re.fullmatch(r"\d{8}_\d{6}", data["run_id"]):
              raise SystemExit("ETF_EU_ROUTINE_PREVIEW_RUN_ID_INVALID")
          parsed = date.fromisoformat(data["report_date"])
          if data["run_id"][:8] != parsed.strftime("%Y%m%d"):
              raise SystemExit("ETF_EU_ROUTINE_PREVIEW_DATE_MISMATCH")
          for key in ("previous_routine_manifest", "previous_delivery_closeout_manifest"):
              if not Path(data[key]).exists():
                  raise SystemExit("ETF_EU_ROUTINE_PREVIEW_REFERENCE_MISSING:" + key)
          mapping = {
              "ETF_EU_REQUEST_PATH": str(path),
              "ETF_EU_RUN_ID": data["run_id"],
              "ETF_EU_REPORT_DATE": data["report_date"],
              "ETF_EU_REPORT_SUFFIX": data["report_suffix"],
              "ETF_EU_PREVIOUS_ROUTINE_MANIFEST": data["previous_routine_manifest"],
              "ETF_EU_PREVIOUS_CLOSEOUT": data["previous_delivery_closeout_manifest"],
          }
          Path("env.out").write_text("".join(f"{k}={v}\n" for k, v in mapping.items()), encoding="utf-8")
          print("ETF_EU_ROUTINE_PREVIEW_REQUEST_OK")
          PY
          cat env.out >> "$GITHUB_ENV"

      - name: Run focused funded-aware tests
        run: |
          set -euo pipefail
          python -m pytest -q tests/test_etf_eu_cap01.py

      - name: Build current UCITS pricing evidence
        run: |
          set -euo pipefail
          python pricing/build_ucits_close_price_validation_basket_results.py --run-id "$ETF_EU_RUN_ID" --pause-seconds 15 --rate-limit-cooldown-seconds 600 --max-attempts 2 --rate-limit-mode stop
          python tools/validate_ucits_close_price_validation_basket_results.py --artifact "output/pricing/ucits_close_price_validation_basket_results_${ETF_EU_RUN_ID}.json"

      - name: Refresh macro context and valuation history
        run: |
          set -euo pipefail
          MACRO_ARTIFACT="output/macro/etf_eu_macro_policy_pack_${ETF_EU_RUN_ID}.json"
          python -m runtime.adapt_weekly_etf_macro_for_eu --source-url "https://raw.githubusercontent.com/market-predictions/weekly-etf/main/output/macro/latest.json" --report-date "$ETF_EU_REPORT_DATE" --run-id "$ETF_EU_RUN_ID" --output "$MACRO_ARTIFACT" --latest-output output/macro/latest.json
          python tools/update_etf_eu_valuation_history.py --portfolio-state output/etf_eu_portfolio_state.json --history output/etf_eu_valuation_history.csv --report-date "$ETF_EU_REPORT_DATE" --source-report "routine-client-grade-v2-${ETF_EU_RUN_ID}" --comment "Three-position funded-aware non-delivery preview" --output output/etf_eu_valuation_history.csv
          echo "ETF_EU_MACRO_ARTIFACT=$MACRO_ARTIFACT" >> "$GITHUB_ENV"

      - name: Build funded-aware Dutch and English outputs
        run: |
          set -euo pipefail
          python -m tools.build_etf_eu_routine_report_package_v2 --run-id "$ETF_EU_RUN_ID" --report-date "$ETF_EU_REPORT_DATE" --report-suffix "$ETF_EU_REPORT_SUFFIX" --pricing-artifact "output/pricing/ucits_close_price_validation_basket_results_${ETF_EU_RUN_ID}.json" --macro-pack "$ETF_EU_MACRO_ARTIFACT" --registry config/ucits_symbol_registry.yml --previous-routine-manifest "$ETF_EU_PREVIOUS_ROUTINE_MANIFEST" --previous-delivery-closeout-manifest "$ETF_EU_PREVIOUS_CLOSEOUT"

      - name: Run strict machine validation
        run: |
          set -euo pipefail
          mkdir -p output/quality
          V2_STATE="output/runtime/etf_eu_client_grade_report_state_${ETF_EU_RUN_ID}.json"
          V2_VALIDATION="output/quality/etf_eu_client_grade_v2_validation_${ETF_EU_RUN_ID}.json"
          python -m tools.validate_etf_eu_client_grade_report_v2 --state "$V2_STATE" --dutch-html "output/fresh_generation/weekly_etf_eu_review_nl_${ETF_EU_REPORT_SUFFIX}.html" --dutch-pdf "output/fresh_generation/weekly_etf_eu_review_nl_${ETF_EU_REPORT_SUFFIX}.pdf" --english-html "output/fresh_generation/weekly_etf_eu_review_${ETF_EU_REPORT_SUFFIX}.html" --english-pdf "output/fresh_generation/weekly_etf_eu_review_${ETF_EU_REPORT_SUFFIX}.pdf" --output "$V2_VALIDATION" --strict
          python -m tools.write_etf_eu_routine_v2_machine_gate --validation "$V2_VALIDATION" --run-id "$ETF_EU_RUN_ID" --output-dir output/quality

      - name: Render every PDF page for review
        run: |
          set -euo pipefail
          REVIEW_ROOT="output/quality/review_pages/${ETF_EU_RUN_ID}"
          mkdir -p "$REVIEW_ROOT/nl/all" "$REVIEW_ROOT/en/all"
          python tools/render_etf_eu_pdf_review_pages.py --pdf "output/fresh_generation/weekly_etf_eu_review_nl_${ETF_EU_REPORT_SUFFIX}.pdf" --output-dir "$REVIEW_ROOT/nl" --write-index "$REVIEW_ROOT/nl/index.json"
          python tools/render_etf_eu_pdf_review_pages.py --pdf "output/fresh_generation/weekly_etf_eu_review_${ETF_EU_REPORT_SUFFIX}.pdf" --output-dir "$REVIEW_ROOT/en" --write-index "$REVIEW_ROOT/en/index.json"
          pdftoppm -png -r 120 "output/fresh_generation/weekly_etf_eu_review_nl_${ETF_EU_REPORT_SUFFIX}.pdf" "$REVIEW_ROOT/nl/all/page"
          pdftoppm -png -r 120 "output/fresh_generation/weekly_etf_eu_review_${ETF_EU_REPORT_SUFFIX}.pdf" "$REVIEW_ROOT/en/all/page"

      - name: Write non-delivery preview manifest
        run: |
          python - <<'PY'
          import json, os
          from pathlib import Path
          run_id = os.environ["ETF_EU_RUN_ID"]
          suffix = os.environ["ETF_EU_REPORT_SUFFIX"]
          payload = {
              "schema_version": "etf_eu_routine_preview_manifest_v1",
              "artifact_type": "etf_eu_routine_preview_manifest",
              "run_id": run_id,
              "report_date": os.environ["ETF_EU_REPORT_DATE"],
              "report_suffix": suffix,
              "status": "generated_and_machine_validated_pending_complete_visual_review",
              "position_count_expected": 3,
              "model_portfolio_only": True,
              "real_broker_execution": False,
              "production_delivery_authority": False,
              "transport_attempted": False,
              "send_executed": False,
              "receipt_confirmed": False,
              "visual_review_pending": True,
              "outputs": [
                  f"output/fresh_generation/weekly_etf_eu_review_nl_{suffix}.html",
                  f"output/fresh_generation/weekly_etf_eu_review_nl_{suffix}.pdf",
                  f"output/fresh_generation/weekly_etf_eu_review_{suffix}.html",
                  f"output/fresh_generation/weekly_etf_eu_review_{suffix}.pdf",
              ],
          }
          out = Path(f"output/run_manifests/etf_eu_routine_preview_manifest_{run_id}.json")
          out.parent.mkdir(parents=True, exist_ok=True)
          out.write_text(json.dumps(payload, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          PY

      - name: Persist preview and review evidence
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f "output/pricing/ucits_close_price_validation_basket_results_${ETF_EU_RUN_ID}.json" "$ETF_EU_MACRO_ARTIFACT" output/macro/latest.json output/etf_eu_valuation_history.csv "output/runtime/etf_eu_client_grade_report_state_${ETF_EU_RUN_ID}.json" "output/fresh_generation/weekly_etf_eu_review_nl_${ETF_EU_REPORT_SUFFIX}.md" "output/fresh_generation/weekly_etf_eu_review_${ETF_EU_REPORT_SUFFIX}.md" "output/fresh_generation/weekly_etf_eu_review_nl_${ETF_EU_REPORT_SUFFIX}.html" "output/fresh_generation/weekly_etf_eu_review_${ETF_EU_REPORT_SUFFIX}.html" "output/fresh_generation/weekly_etf_eu_review_nl_${ETF_EU_REPORT_SUFFIX}.pdf" "output/fresh_generation/weekly_etf_eu_review_${ETF_EU_REPORT_SUFFIX}.pdf" "output/fresh_generation/etf_eu_fresh_generation_package_manifest_${ETF_EU_RUN_ID}.json" "output/fresh_generation/etf_eu_ready_for_controlled_delivery_${ETF_EU_RUN_ID}.json" "output/quality/etf_eu_client_grade_v2_validation_${ETF_EU_RUN_ID}.json" "output/quality/etf_eu_routine_pdf_client_grade_${ETF_EU_RUN_ID}_nl.json" "output/quality/etf_eu_routine_pdf_client_grade_${ETF_EU_RUN_ID}_en.json" "output/quality/etf_eu_routine_pdf_client_grade_${ETF_EU_RUN_ID}.json" "output/quality/review_pages/${ETF_EU_RUN_ID}" "output/run_manifests/etf_eu_routine_run_manifest_${ETF_EU_REPORT_DATE}_${ETF_EU_RUN_ID}.json" "output/run_manifests/etf_eu_routine_preview_manifest_${ETF_EU_RUN_ID}.json"
          git commit -m "Persist ETF EU three-position routine preview ${ETF_EU_RUN_ID} [skip ci]"
          git push origin HEAD:main
