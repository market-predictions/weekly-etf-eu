name: Weekly ETF EU routine production run

on:
  push:
    branches:
      - main
    paths:
      - "control/run_queue/etf_eu_routine_report_request_*.md"
  workflow_dispatch:
    inputs:
      request_path:
        description: "Prepared routine report request path"
        required: true
        default: "control/run_queue/etf_eu_routine_report_request_20260712_125000.md"

permissions:
  contents: write

jobs:
  routine-production:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system PDF packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcairo2 \
            libpango-1.0-0 \
            libgdk-pixbuf-2.0-0 \
            libffi-dev \
            shared-mime-info \
            fonts-liberation \
            fonts-dejavu-core \
            fonts-lato \
            poppler-utils

      - name: Install routine dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install pyyaml yfinance mistune weasyprint

      - name: Resolve and validate routine request
        run: |
          set -euo pipefail
          REQUEST_PATH="${{ github.event.inputs.request_path || '' }}"
          if [ -z "$REQUEST_PATH" ]; then
            REQUEST_PATH="$(git diff-tree --no-commit-id --name-only -r HEAD | grep '^control/run_queue/etf_eu_routine_report_request_.*\.md$' | head -1 || true)"
          fi
          if [ -z "$REQUEST_PATH" ]; then
            echo "ETF_EU_ROUTINE_REQUEST_NOT_RESOLVED" >&2
            exit 1
          fi
          python tools/validate_etf_eu_routine_report_request.py --request "$REQUEST_PATH"
          python - "$REQUEST_PATH" <<'PY'
          import sys
          from pathlib import Path
          from tools.validate_etf_eu_routine_report_request import parse

          data = parse(Path(sys.argv[1]))
          mapping = {
              "ETF_EU_REQUEST_PATH": sys.argv[1],
              "ETF_EU_RUN_ID": data["run_id"],
              "ETF_EU_REPORT_DATE": data["report_date"],
              "ETF_EU_REPORT_SUFFIX": data["report_suffix"],
              "ETF_EU_PREVIOUS_ROUTINE_MANIFEST": data["previous_routine_manifest"],
              "ETF_EU_PREVIOUS_CLOSEOUT": data["previous_delivery_closeout_manifest"],
              "ETF_EU_SEND_CONFIRMATION": data["send_confirmation"],
          }
          with Path("env.out").open("w", encoding="utf-8") as handle:
              for key, value in mapping.items():
                  handle.write(f"{key}={value}\n")
          PY
          cat env.out >> "$GITHUB_ENV"

      - name: Validate routine implementation preflight
        run: |
          set -euo pipefail
          python -m tools.validate_etf_eu_routine_preflight \
            --request "$ETF_EU_REQUEST_PATH"

      - name: Build current UCITS pricing evidence
        run: |
          set -euo pipefail
          python pricing/build_ucits_close_price_validation_basket_results.py \
            --run-id "$ETF_EU_RUN_ID" \
            --pause-seconds 15 \
            --rate-limit-cooldown-seconds 600 \
            --max-attempts 2 \
            --rate-limit-mode stop
          python tools/validate_ucits_close_price_validation_basket_results.py \
            --artifact "output/pricing/ucits_close_price_validation_basket_results_${ETF_EU_RUN_ID}.json"

      - name: Refresh macro context and valuation history
        run: |
          set -euo pipefail
          MACRO_ARTIFACT="output/macro/etf_eu_macro_policy_pack_${ETF_EU_RUN_ID}.json"
          python -m runtime.adapt_weekly_etf_macro_for_eu \
            --source-url "https://raw.githubusercontent.com/market-predictions/weekly-etf/main/output/macro/latest.json" \
            --report-date "$ETF_EU_REPORT_DATE" \
            --run-id "$ETF_EU_RUN_ID" \
            --output "$MACRO_ARTIFACT" \
            --latest-output output/macro/latest.json
          python tools/update_etf_eu_valuation_history.py \
            --portfolio-state output/etf_eu_portfolio_state.json \
            --history output/etf_eu_valuation_history.csv \
            --report-date "$ETF_EU_REPORT_DATE" \
            --source-report "routine-client-grade-v2-${ETF_EU_RUN_ID}" \
            --comment "Validated routine EU/UCITS production observation" \
            --output output/etf_eu_valuation_history.csv
          echo "ETF_EU_MACRO_ARTIFACT=$MACRO_ARTIFACT" >> "$GITHUB_ENV"

      - name: Build promoted client-grade v2 routine package
        run: |
          set -euo pipefail
          python -m tools.build_etf_eu_routine_report_package_v2 \
            --run-id "$ETF_EU_RUN_ID" \
            --report-date "$ETF_EU_REPORT_DATE" \
            --report-suffix "$ETF_EU_REPORT_SUFFIX" \
            --pricing-artifact "output/pricing/ucits_close_price_validation_basket_results_${ETF_EU_RUN_ID}.json" \
            --macro-pack "$ETF_EU_MACRO_ARTIFACT" \
            --registry config/ucits_symbol_registry.yml \
            --previous-routine-manifest "$ETF_EU_PREVIOUS_ROUTINE_MANIFEST" \
            --previous-delivery-closeout-manifest "$ETF_EU_PREVIOUS_CLOSEOUT"

      - name: Validate promoted client-grade v2 machine contract
        run: |
          set -euo pipefail
          mkdir -p output/quality
          V2_STATE="output/runtime/etf_eu_client_grade_report_state_${ETF_EU_RUN_ID}.json"
          V2_VALIDATION="output/quality/etf_eu_client_grade_v2_validation_${ETF_EU_RUN_ID}.json"
          python -m tools.validate_etf_eu_client_grade_report_v2 \
            --state "$V2_STATE" \
            --dutch-html "output/fresh_generation/weekly_etf_eu_review_nl_${ETF_EU_REPORT_SUFFIX}.html" \
            --dutch-pdf "output/fresh_generation/weekly_etf_eu_review_nl_${ETF_EU_REPORT_SUFFIX}.pdf" \
            --english-html "output/fresh_generation/weekly_etf_eu_review_${ETF_EU_REPORT_SUFFIX}.html" \
            --english-pdf "output/fresh_generation/weekly_etf_eu_review_${ETF_EU_REPORT_SUFFIX}.pdf" \
            --output "$V2_VALIDATION" \
            --strict
          python -m tools.write_etf_eu_routine_v2_machine_gate \
            --validation "$V2_VALIDATION" \
            --run-id "$ETF_EU_RUN_ID" \
            --output-dir output/quality

      - name: Render complete routine PDF review pages
        run: |
          set -euo pipefail
          REVIEW_ROOT="output/quality/review_pages/${ETF_EU_RUN_ID}"
          mkdir -p "$REVIEW_ROOT/nl/all" "$REVIEW_ROOT/en/all"
          python tools/render_etf_eu_pdf_review_pages.py \
            --pdf "output/fresh_generation/weekly_etf_eu_review_nl_${ETF_EU_REPORT_SUFFIX}.pdf" \
            --output-dir "$REVIEW_ROOT/nl" \
            --write-index "$REVIEW_ROOT/nl/index.json"
          python tools/render_etf_eu_pdf_review_pages.py \
            --pdf "output/fresh_generation/weekly_etf_eu_review_${ETF_EU_REPORT_SUFFIX}.pdf" \
            --output-dir "$REVIEW_ROOT/en" \
            --write-index "$REVIEW_ROOT/en/index.json"
          pdftoppm -png -r 120 \
            "output/fresh_generation/weekly_etf_eu_review_nl_${ETF_EU_REPORT_SUFFIX}.pdf" \
            "$REVIEW_ROOT/nl/all/page"
          pdftoppm -png -r 120 \
            "output/fresh_generation/weekly_etf_eu_review_${ETF_EU_REPORT_SUFFIX}.pdf" \
            "$REVIEW_ROOT/en/all/page"

      - name: Persist pre-delivery client-grade v2 preview
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f \
            "output/pricing/ucits_close_price_validation_basket_results_${ETF_EU_RUN_ID}.json" \
            "$ETF_EU_MACRO_ARTIFACT" \
            output/macro/latest.json \
            output/etf_eu_valuation_history.csv \
            "output/runtime/etf_eu_client_grade_report_state_${ETF_EU_RUN_ID}.json" \
            "output/fresh_generation/weekly_etf_eu_review_nl_${ETF_EU_REPORT_SUFFIX}.md" \
            "output/fresh_generation/weekly_etf_eu_review_${ETF_EU_REPORT_SUFFIX}.md" \
            "output/fresh_generation/weekly_etf_eu_review_nl_${ETF_EU_REPORT_SUFFIX}.html" \
            "output/fresh_generation/weekly_etf_eu_review_${ETF_EU_REPORT_SUFFIX}.html" \
            "output/fresh_generation/weekly_etf_eu_review_nl_${ETF_EU_REPORT_SUFFIX}.pdf" \
            "output/fresh_generation/weekly_etf_eu_review_${ETF_EU_REPORT_SUFFIX}.pdf" \
            "output/fresh_generation/etf_eu_fresh_generation_package_manifest_${ETF_EU_RUN_ID}.json" \
            "output/fresh_generation/etf_eu_ready_for_controlled_delivery_${ETF_EU_RUN_ID}.json" \
            "output/quality/etf_eu_client_grade_v2_validation_${ETF_EU_RUN_ID}.json" \
            "output/quality/etf_eu_routine_pdf_client_grade_${ETF_EU_RUN_ID}_nl.json" \
            "output/quality/etf_eu_routine_pdf_client_grade_${ETF_EU_RUN_ID}_en.json" \
            "output/quality/etf_eu_routine_pdf_client_grade_${ETF_EU_RUN_ID}.json" \
            "output/quality/review_pages/${ETF_EU_RUN_ID}" \
            "output/run_manifests/etf_eu_routine_run_manifest_${ETF_EU_REPORT_DATE}_${ETF_EU_RUN_ID}.json"
          if ! git diff --cached --quiet; then
            git commit -m "Persist ETF EU client-grade v2 pre-delivery preview ${ETF_EU_RUN_ID} [skip ci]"
            git push origin HEAD:main
          fi

      - name: Require explicit rendered-page visual review
        run: |
          set -euo pipefail
          VISUAL_REVIEW="output/quality/etf_eu_routine_pdf_visual_review_${ETF_EU_RUN_ID}.json"
          if [ ! -f "$VISUAL_REVIEW" ]; then
            echo "ETF_EU_PDF_VISUAL_REVIEW_REQUIRED | artifact=$VISUAL_REVIEW" >&2
            exit 1
          fi
          python - "$VISUAL_REVIEW" <<'PY'
          import json
          import sys
          from pathlib import Path

          path = Path(sys.argv[1])
          payload = json.loads(path.read_text(encoding="utf-8"))
          if payload.get("visual_review_passed") is not True or payload.get("blockers"):
              raise SystemExit("ETF_EU_PDF_VISUAL_REVIEW_NOT_PASSED")
          print(f"ETF_EU_PDF_VISUAL_REVIEW_OK | artifact={path}")
          PY

      - name: Validate routine package readiness
        run: |
          set -euo pipefail
          python -m tools.prepare_etf_eu_routine_package_readiness_v2 \
            --manifest "output/fresh_generation/etf_eu_fresh_generation_package_manifest_${ETF_EU_RUN_ID}.json" \
            --ready-artifact "output/fresh_generation/etf_eu_ready_for_controlled_delivery_${ETF_EU_RUN_ID}.json" \
            --routine-manifest "output/run_manifests/etf_eu_routine_run_manifest_${ETF_EU_REPORT_DATE}_${ETF_EU_RUN_ID}.json" \
            --write-gate "output/fresh_generation/etf_eu_routine_package_readiness_${ETF_EU_RUN_ID}.json" \
            --pdf-client-grade-gate "output/quality/etf_eu_routine_pdf_client_grade_${ETF_EU_RUN_ID}.json" \
            --pdf-visual-review "output/quality/etf_eu_routine_pdf_visual_review_${ETF_EU_RUN_ID}.json"

      - name: Prepare current-run delivery control
        run: |
          set -euo pipefail
          python tools/prepare_etf_eu_routine_delivery_control.py \
            --run-id "$ETF_EU_RUN_ID" \
            --report-date "$ETF_EU_REPORT_DATE" \
            --report-suffix "$ETF_EU_REPORT_SUFFIX" \
            --package-manifest "output/fresh_generation/etf_eu_fresh_generation_package_manifest_${ETF_EU_RUN_ID}.json" \
            --ready-artifact "output/fresh_generation/etf_eu_ready_for_controlled_delivery_${ETF_EU_RUN_ID}.json" \
            --routine-manifest "output/run_manifests/etf_eu_routine_run_manifest_${ETF_EU_REPORT_DATE}_${ETF_EU_RUN_ID}.json"
          python tools/validate_etf_eu_routine_delivery_queue.py \
            --queue "control/run_queue/etf_eu_routine_delivery_request_${ETF_EU_RUN_ID}.md"

      - name: Execute guarded current-run delivery
        env:
          MRKT_RPRTS_SMTP_HOST: ${{ secrets.MRKT_RPRTS_SMTP_HOST }}
          MRKT_RPRTS_SMTP_PORT: ${{ secrets.MRKT_RPRTS_SMTP_PORT }}
          MRKT_RPRTS_SMTP_USER: ${{ secrets.MRKT_RPRTS_SMTP_USER }}
          MRKT_RPRTS_SMTP_PASS: ${{ secrets.MRKT_RPRTS_SMTP_PASS }}
          MRKT_RPRTS_MAIL_FROM: ${{ secrets.MRKT_RPRTS_MAIL_FROM }}
          MRKT_RPRTS_MAIL_TO: ${{ secrets.MRKT_RPRTS_MAIL_TO }}
          MRKT_RPRTS_MAIL_TO_NL: ${{ secrets.MRKT_RPRTS_MAIL_TO_NL }}
          MRKT_RPRTS_SUBJECT_PREFIX_NL: ${{ vars.MRKT_RPRTS_SUBJECT_PREFIX_NL }}
        run: |
          set -euo pipefail
          if [ "$ETF_EU_SEND_CONFIRMATION" != "confirm_guarded_send" ]; then
            echo "ETF_EU_ROUTINE_SEND_CONFIRMATION_MISSING" >&2
            exit 1
          fi
          RUNTIME_RUN_ID="$(date -u +'%Y%m%d_%H%M%S')"
          echo "ETF_EU_RUNTIME_RUN_ID=$RUNTIME_RUN_ID" >> "$GITHUB_ENV"
          python -m runtime.send_etf_eu_current_package_delivery \
            --queue "control/run_queue/etf_eu_routine_delivery_request_${ETF_EU_RUN_ID}.md" \
            --mode send \
            --run-id "$RUNTIME_RUN_ID" \
            --output-dir output/delivery
          python tools/validate_etf_eu_current_package_transport_runner.py \
            --adapter output/delivery_control/etf_eu_current_package_transport_runner_adapter_20260710_000000.json \
            --result "output/delivery/etf_eu_current_package_transport_result_${RUNTIME_RUN_ID}.json"

      - name: Update routine manifest after transport
        run: |
          set -euo pipefail
          python tools/update_etf_eu_routine_after_transport.py \
            --routine-manifest "output/run_manifests/etf_eu_routine_run_manifest_${ETF_EU_REPORT_DATE}_${ETF_EU_RUN_ID}.json" \
            --transport-result "output/delivery/etf_eu_current_package_transport_result_${ETF_EU_RUNTIME_RUN_ID}.json" \
            --delivery-evidence "output/delivery/etf_eu_current_package_delivery_evidence_${ETF_EU_RUNTIME_RUN_ID}.json"

      - name: Persist routine production artifacts
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f \
            "output/pricing/ucits_close_price_validation_basket_results_${ETF_EU_RUN_ID}.json" \
            "$ETF_EU_MACRO_ARTIFACT" \
            output/macro/latest.json \
            output/etf_eu_valuation_history.csv \
            "output/runtime/etf_eu_client_grade_report_state_${ETF_EU_RUN_ID}.json" \
            "output/fresh_generation/weekly_etf_eu_review_nl_${ETF_EU_REPORT_SUFFIX}.md" \
            "output/fresh_generation/weekly_etf_eu_review_${ETF_EU_REPORT_SUFFIX}.md" \
            "output/fresh_generation/weekly_etf_eu_review_nl_${ETF_EU_REPORT_SUFFIX}.html" \
            "output/fresh_generation/weekly_etf_eu_review_${ETF_EU_REPORT_SUFFIX}.html" \
            "output/fresh_generation/weekly_etf_eu_review_nl_${ETF_EU_REPORT_SUFFIX}.pdf" \
            "output/fresh_generation/weekly_etf_eu_review_${ETF_EU_REPORT_SUFFIX}.pdf" \
            "output/fresh_generation/etf_eu_fresh_generation_package_manifest_${ETF_EU_RUN_ID}.json" \
            "output/fresh_generation/etf_eu_ready_for_controlled_delivery_${ETF_EU_RUN_ID}.json" \
            "output/fresh_generation/etf_eu_routine_package_readiness_${ETF_EU_RUN_ID}.json" \
            "output/quality/etf_eu_client_grade_v2_validation_${ETF_EU_RUN_ID}.json" \
            "output/quality/etf_eu_routine_pdf_client_grade_${ETF_EU_RUN_ID}_nl.json" \
            "output/quality/etf_eu_routine_pdf_client_grade_${ETF_EU_RUN_ID}_en.json" \
            "output/quality/etf_eu_routine_pdf_client_grade_${ETF_EU_RUN_ID}.json" \
            "output/quality/etf_eu_routine_pdf_visual_review_${ETF_EU_RUN_ID}.json" \
            "output/quality/review_pages/${ETF_EU_RUN_ID}" \
            "output/delivery_prep/etf_eu_guarded_fresh_package_delivery_prep_${ETF_EU_RUN_ID}.json" \
            "output/delivery_authorization/etf_eu_guarded_send_authorization_${ETF_EU_RUN_ID}.json" \
            "output/delivery_control/etf_eu_controlled_delivery_decision_${ETF_EU_RUN_ID}.json" \
            "output/delivery_control/etf_eu_controlled_delivery_transport_selection_${ETF_EU_RUN_ID}.json" \
            "control/run_queue/etf_eu_routine_delivery_request_${ETF_EU_RUN_ID}.md" \
            "output/delivery/etf_eu_current_package_transport_result_${ETF_EU_RUNTIME_RUN_ID}.json" \
            "output/delivery/etf_eu_current_package_delivery_evidence_${ETF_EU_RUNTIME_RUN_ID}.json" \
            "output/run_manifests/etf_eu_routine_run_manifest_${ETF_EU_REPORT_DATE}_${ETF_EU_RUN_ID}.json" \
            output/run_manifests/latest_etf_eu_routine_run_manifest_path.txt
          if git diff --cached --quiet; then
            echo "ETF_EU_ROUTINE_ARTIFACTS_NOT_STAGED" >&2
            exit 1
          fi
          git commit -m "Persist ETF EU client-grade v2 routine production run ${ETF_EU_RUN_ID} [skip ci]"
          git push origin HEAD:main
