name: Weekly ETF EU controlled transport

on:
  workflow_dispatch:
    inputs:
      delivery_mode:
        description: "Must be send"
        required: true
        default: "validate_only"
        type: choice
        options:
          - validate_only
          - send
      send_confirmation:
        description: "Second confirmation for controlled ETF EU transport"
        required: true
        default: "not_confirmed"
        type: choice
        options:
          - not_confirmed
          - confirm_guarded_send
      report_suffix:
        description: "YYMMDD suffix of the already-rendered EU report pair"
        required: true
        type: string

permissions:
  contents: write

jobs:
  controlled-transport:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve controlled transport identity
        run: |
          RUN_ID="$(date -u +'%Y%m%d_%H%M%S')"
          REPORT_DATE="$(date -u +'%Y-%m-%d')"
          REPORT_SUFFIX="${{ github.event.inputs.report_suffix }}"
          echo "ETF_EU_RUN_ID=$RUN_ID" >> "$GITHUB_ENV"
          echo "ETF_EU_REPORT_DATE=$REPORT_DATE" >> "$GITHUB_ENV"
          echo "ETF_EU_REPORT_SUFFIX=$REPORT_SUFFIX" >> "$GITHUB_ENV"
          echo "ETF_EU_CONTROLLED_TRANSPORT_RUN_ID=$RUN_ID"

      - name: Validate controlled transport guard
        run: |
          if [ "${{ github.event.inputs.delivery_mode }}" != "send" ]; then
            echo "ETF_EU_CONTROLLED_TRANSPORT_MODE_NOT_SEND" >&2
            exit 1
          fi
          if [ "${{ github.event.inputs.send_confirmation }}" != "confirm_guarded_send" ]; then
            echo "ETF_EU_CONTROLLED_TRANSPORT_CONFIRMATION_MISSING" >&2
            exit 1
          fi
          echo "ETF_EU_CONTROLLED_TRANSPORT_GUARD_OK"

      - name: Validate rendered EU report pair
        run: |
          test -f "output/weekly_etf_eu_review_nl_${ETF_EU_REPORT_SUFFIX}.md"
          test -f "output/weekly_etf_eu_review_${ETF_EU_REPORT_SUFFIX}.md"
          python tools/validate_etf_eu_output_contract.py --output-dir output --require-production-dutch-first --report-suffix "$ETF_EU_REPORT_SUFFIX"
          python tools/validate_etf_eu_pricing_surface.py "output/weekly_etf_eu_review_${ETF_EU_REPORT_SUFFIX}.md" --require-production-dutch-first
          python tools/validate_etf_eu_pricing_surface.py "output/weekly_etf_eu_review_nl_${ETF_EU_REPORT_SUFFIX}.md" --require-production-dutch-first

      - name: Build and validate ETF EU PDF package
        run: |
          python -m runtime.render_etf_eu_delivery_package \
            --run-id "$ETF_EU_RUN_ID" \
            --report-suffix "$ETF_EU_REPORT_SUFFIX"
          python tools/validate_etf_eu_delivery_package_manifest.py \
            --manifest "output/delivery_package/etf_eu_delivery_package_manifest_${ETF_EU_RUN_ID}.json"

      - name: Build controlled pre-transport evidence
        run: |
          python -m runtime.write_etf_eu_delivery_evidence \
            --mvp18-controlled \
            --stage pre \
            --run-id "$ETF_EU_RUN_ID" \
            --report-date "$ETF_EU_REPORT_DATE" \
            --report-suffix "$ETF_EU_REPORT_SUFFIX" \
            --output-dir output/delivery

      - name: Execute controlled EU transport entrypoint
        env:
          ETF_EU_TRANSPORT_HOST: ${{ secrets.MRKT_RPRTS_SMTP_HOST }}
          ETF_EU_TRANSPORT_PORT: ${{ secrets.MRKT_RPRTS_SMTP_PORT }}
          ETF_EU_TRANSPORT_USER: ${{ secrets.MRKT_RPRTS_SMTP_USER }}
          ETF_EU_TRANSPORT_AUTH: ${{ secrets.MRKT_RPRTS_SMTP_PASS }}
          ETF_EU_FROM_ADDRESS: ${{ secrets.MRKT_RPRTS_MAIL_FROM }}
          ETF_EU_TO_NL: ${{ secrets.MRKT_RPRTS_MAIL_TO }}
          ETF_EU_TO_EN: ${{ secrets.MRKT_RPRTS_MAIL_TO }}
        run: |
          python -m runtime.send_etf_eu_controlled_report \
            --confirm-controlled-send \
            --run-id "$ETF_EU_RUN_ID" \
            --report-date "$ETF_EU_REPORT_DATE" \
            --report-suffix "$ETF_EU_REPORT_SUFFIX" \
            --require-pdf-package \
            --delivery-package-manifest "output/delivery_package/etf_eu_delivery_package_manifest_${ETF_EU_RUN_ID}.json" \
            --output-dir output/delivery

      - name: Build controlled post-transport evidence
        run: |
          python -m runtime.write_etf_eu_delivery_evidence \
            --mvp18-controlled \
            --stage post \
            --run-id "$ETF_EU_RUN_ID" \
            --report-date "$ETF_EU_REPORT_DATE" \
            --report-suffix "$ETF_EU_REPORT_SUFFIX" \
            --transport-result-path "output/delivery/etf_eu_transport_result_${ETF_EU_RUN_ID}.json" \
            --output-dir output/delivery

      - name: Build controlled delayed receipt check artifact
        run: |
          python -m runtime.check_etf_eu_delivery_receipt \
            --run-id "$ETF_EU_RUN_ID" \
            --evidence-path "output/delivery/etf_eu_delivery_evidence_${ETF_EU_RUN_ID}.json" \
            --delay-minutes 10 \
            --output-dir output/delivery

      - name: Commit controlled transport artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/delivery/etf_eu_delivery_evidence_*.json output/delivery/etf_eu_transport_result_*.json output/delivery/etf_eu_receipt_check_*.json output/delivery_package/* || true
          if git diff --cached --quiet; then
            echo "No controlled transport artifacts to commit."
            exit 0
          fi
          git commit -m "Persist ETF EU controlled transport artifacts [skip ci]"
          git push origin HEAD:main
