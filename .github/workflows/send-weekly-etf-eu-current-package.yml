name: Weekly ETF EU current-package delivery workflow

on:
  push:
    branches:
      - main
    paths:
      - "control/run_queue/etf_eu_current_package_delivery_request_*.md"
  workflow_dispatch:
    inputs:
      delivery_mode:
        description: "Current-package ETF EU mode"
        required: true
        default: "validate_only"
        type: choice
        options:
          - validate_only
          - dry_run
          - send
      queue_path:
        description: "Prepared current-package queue artifact path (paste the path only)"
        required: true
        default: "control/prepared_delivery/etf_eu_current_package_delivery_request_20260717_141500.md"
      send_confirmation:
        description: "Guarded boundary for current-package send"
        required: true
        default: "not_confirmed"
        type: choice
        options:
          - not_confirmed
          - confirm_guarded_send

permissions:
  contents: write

jobs:
  current-package-delivery:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve current-package queue and mode
        run: |
          set -euo pipefail
          DEFAULT_QUEUE="control/prepared_delivery/etf_eu_current_package_delivery_request_20260717_141500.md"
          MODE="${{ github.event.inputs.delivery_mode || 'validate_only' }}"
          QUEUE_PATH="${{ github.event.inputs.queue_path || '' }}"
          CONFIRMATION="${{ github.event.inputs.send_confirmation || 'not_confirmed' }}"
          if [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            QUEUE_PATH="$(git diff-tree --no-commit-id --name-only -r HEAD | grep '^control/run_queue/etf_eu_current_package_delivery_request_.*\.md$' | head -1 || true)"
            if [ -n "$QUEUE_PATH" ]; then
              MODE="$(awk -F= '$1 == "delivery_mode" {print $2}' "$QUEUE_PATH" | tail -1)"
              CONFIRMATION="$(awk -F= '$1 == "send_confirmation" {print $2}' "$QUEUE_PATH" | tail -1)"
            fi
          fi
          MODE="$(printf '%s' "$MODE" | tr -d '\r' | sed -e 's/^[[:space:]]*delivery_mode=//' -e 's/[[:space:]]*$//')"
          QUEUE_PATH="$(printf '%s' "$QUEUE_PATH" | tr -d '\r' | sed -e 's/^[[:space:]]*queue_path=//' -e 's/[[:space:]]*$//')"
          CONFIRMATION="$(printf '%s' "$CONFIRMATION" | tr -d '\r' | sed -e 's/^[[:space:]]*send_confirmation=//' -e 's/[[:space:]]*$//')"
          if [ -z "$QUEUE_PATH" ]; then
            QUEUE_PATH="$DEFAULT_QUEUE"
          fi
          if [ ! -f "$QUEUE_PATH" ]; then
            echo "ETF_EU_CURRENT_PACKAGE_QUEUE_MISSING | queue=$QUEUE_PATH" >&2
            exit 1
          fi
          case "$MODE" in
            validate_only|dry_run|send) ;;
            *) echo "Unsupported current-package mode=$MODE" >&2; exit 1 ;;
          esac
          if [ "$MODE" = "send" ]; then
            case "$QUEUE_PATH" in
              control/prepared_delivery/*) ;;
              *)
                echo "ETF_EU_SEND_REQUIRES_PREPARED_DELIVERY_QUEUE | queue=$QUEUE_PATH" >&2
                exit 1
                ;;
            esac
            if ! grep -q '^accepted_package_lock=' "$QUEUE_PATH"; then
              echo "ETF_EU_PREPARED_QUEUE_LOCK_REFERENCE_MISSING | queue=$QUEUE_PATH" >&2
              exit 1
            fi
          fi
          QUEUE_RUN_ID="$(awk -F= '$1 == "run_id" {print $2}' "$QUEUE_PATH" | tail -1)"
          LOCK_PATH="$(awk -F= '$1 == "accepted_package_lock" {print $2}' "$QUEUE_PATH" | tail -1)"
          echo "ETF_EU_DELIVERY_MODE=$MODE" >> "$GITHUB_ENV"
          echo "ETF_EU_QUEUE_PATH=$QUEUE_PATH" >> "$GITHUB_ENV"
          echo "ETF_EU_SEND_CONFIRMATION=$CONFIRMATION" >> "$GITHUB_ENV"
          echo "ETF_EU_CURRENT_PACKAGE_QUEUE_OK | mode=$MODE | queue=$QUEUE_PATH | run_id=$QUEUE_RUN_ID | lock=$LOCK_PATH"

      - name: Validate current-package queue and immutable lock
        run: |
          set -euo pipefail
          python tools/validate_etf_eu_current_package_delivery_queue.py --queue "$ETF_EU_QUEUE_PATH"

      - name: Block duplicate successful delivery
        if: env.ETF_EU_DELIVERY_MODE == 'send'
        run: |
          set -euo pipefail
          python - "$ETF_EU_QUEUE_PATH" <<'PY'
          import json
          import sys
          from pathlib import Path

          queue = {}
          for raw in Path(sys.argv[1]).read_text(encoding="utf-8").splitlines():
              if "=" in raw and not raw.lstrip().startswith("#"):
                  key, value = raw.split("=", 1)
                  queue[key.strip()] = value.strip()
          suffix = queue["report_suffix"]
          package = queue["package_manifest"]
          for path in Path("output/delivery").glob("etf_eu_current_package_transport_result_*.json"):
              payload = json.loads(path.read_text(encoding="utf-8"))
              if (
                  payload.get("transport_success") is True
                  and str(payload.get("report_suffix")) == suffix
                  and str(payload.get("queue_artifact")) == str(sys.argv[1])
              ):
                  raise SystemExit(f"ETF_EU_CURRENT_PACKAGE_ALREADY_SENT | result={path} | package={package}")
          print("ETF_EU_CURRENT_PACKAGE_IDEMPOTENCY_OK")
          PY

      - name: Validate current-package workflow wiring artifact
        run: |
          set -euo pipefail
          python tools/validate_etf_eu_delivery_workflow_wiring.py \
            --artifact output/delivery_control/etf_eu_delivery_workflow_wiring_20260710_000000.json

      - name: Validate current-package transport adapter
        run: |
          set -euo pipefail
          python tools/validate_etf_eu_current_package_transport_runner.py \
            --adapter output/delivery_control/etf_eu_current_package_transport_runner_adapter_20260710_000000.json

      - name: Current-package validate-only boundary
        if: env.ETF_EU_DELIVERY_MODE == 'validate_only'
        run: |
          echo "ETF_EU_CURRENT_PACKAGE_VALIDATE_ONLY_OK"
          echo "No live delivery, portfolio mutation, recipient exposure, or receipt claim is performed."

      - name: Current-package dry-run transport evidence
        if: env.ETF_EU_DELIVERY_MODE == 'dry_run'
        run: |
          set -euo pipefail
          RUN_ID="$(date -u +'%Y%m%d_%H%M%S')"
          python -m runtime.send_etf_eu_current_package_delivery \
            --queue "$ETF_EU_QUEUE_PATH" \
            --mode dry_run \
            --run-id "$RUN_ID" \
            --output-dir output/delivery
          python tools/validate_etf_eu_current_package_transport_runner.py \
            --adapter output/delivery_control/etf_eu_current_package_transport_runner_adapter_20260710_000000.json \
            --result "output/delivery/etf_eu_current_package_transport_result_${RUN_ID}.json"
          echo "ETF_EU_CURRENT_PACKAGE_RESULT=output/delivery/etf_eu_current_package_transport_result_${RUN_ID}.json" >> "$GITHUB_ENV"
          echo "ETF_EU_CURRENT_PACKAGE_EVIDENCE=output/delivery/etf_eu_current_package_delivery_evidence_${RUN_ID}.json" >> "$GITHUB_ENV"

      - name: Guarded current-package send transport
        if: env.ETF_EU_DELIVERY_MODE == 'send'
        env:
          MRKT_RPRTS_SMTP_HOST: ${{ secrets.MRKT_RPRTS_SMTP_HOST }}
          MRKT_RPRTS_SMTP_PORT: ${{ secrets.MRKT_RPRTS_SMTP_PORT }}
          MRKT_RPRTS_SMTP_USER: ${{ secrets.MRKT_RPRTS_SMTP_USER }}
          MRKT_RPRTS_SMTP_PASS: ${{ secrets.MRKT_RPRTS_SMTP_PASS }}
          MRKT_RPRTS_MAIL_FROM: ${{ secrets.MRKT_RPRTS_MAIL_FROM }}
          MRKT_RPRTS_MAIL_TO: ${{ secrets.MRKT_RPRTS_MAIL_TO }}
          MRKT_RPRTS_MAIL_TO_NL: ${{ secrets.MRKT_RPRTS_MAIL_TO_NL }}
          MRKT_RPRTS_SUBJECT_PREFIX_NL: ${{ vars.MRKT_RPRTS_SUBJECT_PREFIX_NL }}
        run: |
          set -euo pipefail
          if [ "$ETF_EU_SEND_CONFIRMATION" != "confirm_guarded_send" ]; then
            echo "ETF_EU_CURRENT_PACKAGE_SEND_CONFIRMATION_MISSING" >&2
            exit 1
          fi
          RUN_ID="$(date -u +'%Y%m%d_%H%M%S')"
          python -m runtime.send_etf_eu_current_package_delivery \
            --queue "$ETF_EU_QUEUE_PATH" \
            --mode send \
            --run-id "$RUN_ID" \
            --output-dir output/delivery
          python tools/validate_etf_eu_current_package_transport_runner.py \
            --adapter output/delivery_control/etf_eu_current_package_transport_runner_adapter_20260710_000000.json \
            --result "output/delivery/etf_eu_current_package_transport_result_${RUN_ID}.json"
          echo "ETF_EU_CURRENT_PACKAGE_RESULT=output/delivery/etf_eu_current_package_transport_result_${RUN_ID}.json" >> "$GITHUB_ENV"
          echo "ETF_EU_CURRENT_PACKAGE_EVIDENCE=output/delivery/etf_eu_current_package_delivery_evidence_${RUN_ID}.json" >> "$GITHUB_ENV"

      - name: Update routine manifest after successful transport
        if: env.ETF_EU_DELIVERY_MODE == 'send'
        run: |
          set -euo pipefail
          ROUTINE_MANIFEST="$(awk -F= '$1 == "routine_run_manifest" {print $2}' "$ETF_EU_QUEUE_PATH" | tail -1)"
          python tools/update_etf_eu_routine_after_transport.py \
            --routine-manifest "$ROUTINE_MANIFEST" \
            --transport-result "$ETF_EU_CURRENT_PACKAGE_RESULT" \
            --delivery-evidence "$ETF_EU_CURRENT_PACKAGE_EVIDENCE"
          echo "ETF_EU_ROUTINE_MANIFEST=$ROUTINE_MANIFEST" >> "$GITHUB_ENV"

      - name: Commit current-package transport evidence
        if: env.ETF_EU_DELIVERY_MODE == 'dry_run' || env.ETF_EU_DELIVERY_MODE == 'send'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f "$ETF_EU_CURRENT_PACKAGE_RESULT" "$ETF_EU_CURRENT_PACKAGE_EVIDENCE"
          if [ "$ETF_EU_DELIVERY_MODE" = "send" ]; then
            git add "$ETF_EU_ROUTINE_MANIFEST"
          fi
          if git diff --cached --quiet; then
            echo "ETF_EU_CURRENT_PACKAGE_TRANSPORT_EVIDENCE_NOT_STAGED" >&2
            exit 1
          fi
          git commit -m "Persist ETF EU current-package transport evidence [skip ci]"
          git pull --rebase origin main
          git push origin HEAD:main
