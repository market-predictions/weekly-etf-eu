name: Weekly ETF EU UCITS bootstrap validation

on:
  push:
    branches:
      - main
    paths:
      - "control/run_queue/weekly_etf_eu_report_request_*.md"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate-eu-bootstrap:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python validation dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml yfinance

      - name: Resolve EU run identity
        run: |
          RUN_ID="$(date -u +'%Y%m%d_%H%M%S')"
          REPORT_DATE="$(date -u +'%Y-%m-%d')"
          echo "ETF_EU_RUN_ID=$RUN_ID" >> "$GITHUB_ENV"
          echo "ETF_EU_REPORT_DATE=$REPORT_DATE" >> "$GITHUB_ENV"
          echo "ETF_EU_RUN_ID=$RUN_ID | report_date=$REPORT_DATE"

      - name: Validate EU control files exist
        run: |
          test -f control/SYSTEM_INDEX.md
          test -f control/CURRENT_STATE.md
          test -f control/NEXT_ACTIONS.md
          test -f control/UCITS_ETF_REVIEW_CONTRACT_V1.md
          test -f control/UCITS_INVESTABILITY_RULES.md
          test -f control/UCITS_SYMBOL_REGISTRY_CONTRACT.md
          test -f control/UCITS_MIGRATION_PLAN.md
          test -f control/ETF_EU_OUTPUT_CONTRACT_V1.md
          test -f control/UCITS_PRICING_LINE_CONTRACT_V1.md
          test -f control/UCITS_VALUATION_PRICING_CONTRACT_V1.md
          test -f control/UCITS_CLOSE_PRICE_ENGINE_CONTRACT_V1.md
          test -f control/ETF_EU_CHANGELOG.md
          echo "ETF_EU_CONTROL_FILES_OK"

      - name: Validate EU config files exist
        run: |
          test -f config/etf_eu_discovery_universe.yml
          test -f config/ucits_symbol_registry.yml
          test -f config/ucits_benchmark_proxy_map.yml
          test -f config/nl_client_investability_rules.yml
          test -f config/ucits_pricing_source_policy.yml
          echo "ETF_EU_CONFIG_FILES_OK"

      - name: Validate UCITS symbol registry and investability contract
        run: |
          python tools/validate_ucits_symbol_registry.py --registry config/ucits_symbol_registry.yml
          python tools/validate_ucits_investability_contract.py --registry config/ucits_symbol_registry.yml

      - name: Build and validate UCITS pricing candidates
        run: |
          python -m pricing.build_ucits_pricing_candidates \
            --registry config/ucits_symbol_registry.yml \
            --output-dir output/pricing \
            --run-id "$ETF_EU_RUN_ID"
          python tools/validate_ucits_pricing_candidates.py \
            --artifact "output/pricing/ucits_pricing_candidates_${ETF_EU_RUN_ID}.json"

      - name: Run non-authoritative UCITS pricing preflight
        run: |
          python -m pricing.run_ucits_pricing_preflight \
            --candidate-artifact "output/pricing/ucits_pricing_candidates_${ETF_EU_RUN_ID}.json" \
            --output-dir output/pricing \
            --run-id "$ETF_EU_RUN_ID"
          python tools/validate_ucits_pricing_preflight.py \
            --artifact "output/pricing/ucits_pricing_preflight_${ETF_EU_RUN_ID}.json"

      - name: Build and validate UCITS valuation pricing artifact
        env:
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
          TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY }}
        run: |
          python -m pricing.build_ucits_valuation_prices \
            --registry config/ucits_symbol_registry.yml \
            --source-policy config/ucits_pricing_source_policy.yml \
            --candidate-artifact "output/pricing/ucits_pricing_candidates_${ETF_EU_RUN_ID}.json" \
            --preflight-artifact "output/pricing/ucits_pricing_preflight_${ETF_EU_RUN_ID}.json" \
            --output-dir output/pricing \
            --run-id "$ETF_EU_RUN_ID"
          python tools/validate_ucits_valuation_prices.py \
            --artifact "output/pricing/ucits_valuation_prices_${ETF_EU_RUN_ID}.json" \
            --source-policy config/ucits_pricing_source_policy.yml

      - name: Snapshot official exchange source candidates
        run: |
          python -m pricing.build_official_exchange_source_snapshot \
            --source-policy config/ucits_pricing_source_policy.yml \
            --output-dir output/pricing \
            --run-id "$ETF_EU_RUN_ID"
          python tools/validate_official_exchange_source_snapshot.py \
            --artifact "output/pricing/ucits_official_exchange_source_snapshot_${ETF_EU_RUN_ID}.json"

      - name: Build official exchange page evidence
        run: |
          python -m pricing.build_official_exchange_page_evidence \
            --source-policy config/ucits_pricing_source_policy.yml \
            --output-dir output/pricing \
            --run-id "$ETF_EU_RUN_ID"
          python tools/validate_official_exchange_page_evidence.py \
            --artifact "output/pricing/ucits_official_exchange_page_evidence_${ETF_EU_RUN_ID}.json"

      - name: Build and validate generic UCITS close observations
        run: |
          python -m pricing.close_engine.engine \
            --source-policy config/ucits_pricing_source_policy.yml \
            --output-dir output/pricing \
            --run-id "$ETF_EU_RUN_ID"
          python tools/validate_ucits_close_observations.py \
            --artifact "output/pricing/ucits_close_observations_${ETF_EU_RUN_ID}.json"

      - name: Build and validate Euronext endpoint evidence
        run: |
          python -m pricing.build_euronext_endpoint_evidence \
            --close-observations "output/pricing/ucits_close_observations_${ETF_EU_RUN_ID}.json" \
            --output-dir output/pricing \
            --run-id "$ETF_EU_RUN_ID"
          python tools/validate_euronext_endpoint_evidence.py \
            --artifact "output/pricing/euronext_endpoint_evidence_${ETF_EU_RUN_ID}.json"

      - name: Build and validate Euronext product-page evidence
        run: |
          python -m pricing.build_euronext_product_page_evidence \
            --close-observations "output/pricing/ucits_close_observations_${ETF_EU_RUN_ID}.json" \
            --output-dir output/pricing \
            --run-id "$ETF_EU_RUN_ID"
          python tools/validate_euronext_product_page_evidence.py \
            --artifact "output/pricing/euronext_product_page_evidence_${ETF_EU_RUN_ID}.json"

      - name: Build and validate Euronext dynamic quote response discovery
        run: |
          python -m pricing.build_euronext_dynamic_quote_response_discovery \
            --product-page-evidence "output/pricing/euronext_product_page_evidence_${ETF_EU_RUN_ID}.json" \
            --output-dir output/pricing \
            --run-id "$ETF_EU_RUN_ID"
          python tools/validate_euronext_dynamic_quote_response_discovery.py \
            --artifact "output/pricing/euronext_dynamic_quote_response_discovery_${ETF_EU_RUN_ID}.json"

      - name: Discover Twelve Data UCITS provider symbols
        env:
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
          TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY }}
        run: |
          python -m pricing.discover_twelve_data_ucits_symbols \
            --source-policy config/ucits_pricing_source_policy.yml \
            --output-dir output/pricing \
            --run-id "$ETF_EU_RUN_ID"
          python tools/validate_ucits_twelve_data_symbol_discovery.py \
            --artifact "output/pricing/ucits_twelve_data_symbol_discovery_${ETF_EU_RUN_ID}.json"

      - name: Validate EU cash-only state and no US ETF holdings
        run: |
          python tools/validate_no_us_etf_as_eu_holding.py --state output/etf_eu_portfolio_state.json
          python - <<'PY'
          import json
          from pathlib import Path
          state = json.loads(Path('output/etf_eu_portfolio_state.json').read_text(encoding='utf-8'))
          assert state.get('schema_version') == 'etf_eu_portfolio_state_v1'
          assert float(state.get('cash_eur', 0)) == 100000.0
          assert float(state.get('invested_market_value_eur', -1)) == 0.0
          assert state.get('positions') == []
          print('ETF_EU_CASH_ONLY_STATE_OK')
          PY

      - name: Render EU candidate report skeleton
        run: |
          python -m runtime.render_etf_eu_report \
            --output-dir output \
            --state output/etf_eu_portfolio_state.json \
            --proxy-map config/ucits_benchmark_proxy_map.yml \
            --registry config/ucits_symbol_registry.yml \
            --pricing-preflight "output/pricing/ucits_pricing_preflight_${ETF_EU_RUN_ID}.json" \
            --report-date "$ETF_EU_REPORT_DATE"

      - name: Validate EU output and candidate report contracts
        run: |
          python tools/validate_etf_eu_output_contract.py --output-dir output
          python tools/validate_etf_eu_candidate_report.py --output-dir output

      - name: Validate inherited US production sender is disabled
        run: |
          if grep -q "MRKT_RPRTS_SMTP" .github/workflows/send-weekly-report.yml; then
            echo "Inherited U.S. send workflow still contains SMTP delivery configuration." >&2
            exit 1
          fi
          if grep -q "weekly_etf_report_request_" .github/workflows/send-weekly-report.yml; then
            echo "Inherited U.S. run queue trigger still active in EU repo." >&2
            exit 1
          fi
          grep -q "DISABLED_INHERITED_US_ETF_SEND_WORKFLOW" .github/workflows/send-weekly-report.yml
          echo "ETF_EU_INHERITED_SEND_DISABLED_OK"

      - name: Confirm no delivery is attempted
        run: |
          echo "ETF_EU_BOOTSTRAP_VALIDATION_ONLY"
          echo "No portfolio mutation, PDF generation or email delivery is performed by this workflow."
          echo "UCITS pricing preflight is non-authoritative and cannot promote candidates to fundable status."
          echo "UCITS valuation pricing artifact is non-mutating and cannot create funding authority."
          echo "Official exchange source snapshot is diagnostic only and cannot create valuation or funding authority."
          echo "Official exchange page evidence is identity evidence only and cannot create valuation or funding authority."
          echo "Generic UCITS close observations are adapter-scaffold evidence only and cannot create valuation or funding authority."
          echo "Euronext endpoint evidence is diagnostic only and cannot create valuation or funding authority."
          echo "Euronext product-page evidence is diagnostic only and cannot create valuation or funding authority."
          echo "Euronext dynamic quote response discovery is diagnostic only and cannot create valuation or funding authority."
          echo "Twelve Data symbol discovery is diagnostic only and cannot create valuation or funding authority."

      - name: Build and validate non-production shadow validation evidence
        run: |
          python tools/build_etf_eu_shadow_validation_evidence.py \
            --run-id "$ETF_EU_RUN_ID" \
            --report-date "$ETF_EU_REPORT_DATE" \
            --output-dir output/validation
          python tools/validate_etf_eu_shadow_validation_evidence.py \
            --artifact "output/validation/etf_eu_shadow_validation_evidence_${ETF_EU_RUN_ID}.json"

      - name: Commit EU bootstrap report and pricing artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/weekly_etf_eu_review_*.md output/pricing/ucits_pricing_candidates_*.json output/pricing/ucits_pricing_preflight_*.json output/pricing/ucits_valuation_prices_*.json output/pricing/ucits_official_exchange_source_snapshot_*.json output/pricing/ucits_official_exchange_page_evidence_*.json output/pricing/ucits_close_observations_*.json output/pricing/euronext_endpoint_evidence_*.json output/pricing/euronext_product_page_evidence_*.json output/pricing/euronext_dynamic_quote_response_discovery_*.json output/pricing/ucits_twelve_data_symbol_discovery_*.json output/validation/etf_eu_shadow_validation_evidence_*.json || true
          if git diff --cached --quiet; then
            echo "No EU bootstrap artifacts to commit."
            exit 0
          fi
          git commit -m "Persist Weekly ETF EU candidate report artifacts [skip ci]"
          git push origin HEAD:main
