name: Weekly ETF EU UCITS rolemodel delivery workflow

on:
  push:
    branches:
      - main
    paths:
      - "control/run_queue/weekly_etf_eu_report_request_*.md"
  workflow_dispatch:
    inputs:
      delivery_mode:
        description: "ETF EU delivery mode: validate_only, dry_run, or send"
        required: true
        default: "validate_only"
        type: choice
        options:
          - validate_only
          - dry_run
          - send
      send_confirmation:
        description: "Second confirmation for guarded ETF EU send path"
        required: true
        default: "not_confirmed"
        type: choice
        options:
          - not_confirmed
          - confirm_guarded_send

permissions:
  contents: write

jobs:
  validate-eu-bootstrap:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python validation dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml yfinance

      - name: Resolve EU run identity
        run: |
          RUN_ID="$(date -u +'%Y%m%d_%H%M%S')"
          echo "ETF_EU_RUN_ID=$RUN_ID" >> "$GITHUB_ENV"
          echo "ETF_EU_EXECUTION_DATE=$(date -u +'%Y-%m-%d')" >> "$GITHUB_ENV"
          echo "ETF_EU_PACKAGE_REPORT_DATE=2026-07-09" >> "$GITHUB_ENV"
          echo "ETF_EU_PACKAGE_REPORT_SUFFIX=260709" >> "$GITHUB_ENV"
          echo "ETF_EU_PACKAGE_RUN_ID=20260709_000000" >> "$GITHUB_ENV"
          echo "ETF_EU_RUN_ID=$RUN_ID | package_report_date=2026-07-09 | package_suffix=260709"

      - name: Resolve EU delivery mode
        run: |
          MODE="${{ github.event.inputs.delivery_mode || 'validate_only' }}"
          CONFIRMATION="${{ github.event.inputs.send_confirmation || 'not_confirmed' }}"
          if [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            MODE="validate_only"
            CONFIRMATION="not_confirmed"
          fi
          case "$MODE" in
            validate_only|dry_run|send)
              ;;
            *)
              echo "Unsupported ETF EU delivery_mode=$MODE" >&2
              exit 1
              ;;
          esac
          case "$CONFIRMATION" in
            not_confirmed|confirm_guarded_send)
              ;;
            *)
              echo "Unsupported ETF EU send_confirmation=$CONFIRMATION" >&2
              exit 1
              ;;
          esac
          echo "ETF_EU_DELIVERY_MODE=$MODE" >> "$GITHUB_ENV"
          echo "ETF_EU_SEND_CONFIRMATION=$CONFIRMATION" >> "$GITHUB_ENV"
          echo "ETF_EU_DELIVERY_MODE_OK | mode=$MODE | confirmation=$CONFIRMATION"

      - name: Validate EU guarded send confirmation precondition
        if: env.ETF_EU_DELIVERY_MODE == 'send'
        run: |
          echo "ETF_EU_SEND_MODE_REQUESTED"
          if [ "$ETF_EU_SEND_CONFIRMATION" != "confirm_guarded_send" ]; then
            echo "ETF_EU_SEND_CONFIRMATION_MISSING" >&2
            exit 1
          fi
          echo "ETF_EU_GUARDED_SEND_CONFIRMATION_OK"

      - name: Validate EU control and transport files exist
        run: |
          test -f control/SYSTEM_INDEX.md
          test -f control/CURRENT_STATE.md
          test -f control/NEXT_ACTIONS.md
          test -f control/ETF_EU_OUTPUT_CONTRACT_V1.md
          test -f control/ETF_EU_DELIVERY_CONTRACT_V1.md
          test -f control/work_packages/ETF_EU_MVP20_GUARDED_CONTROLLED_RESEND_INSTRUCTIONS_20260709.md
          test -f runtime/send_etf_eu_delivery_package.py
          test -f runtime/check_etf_eu_delivery_receipt.py
          test -f tools/validate_etf_eu_delivery_evidence.py
          test -f tools/validate_etf_eu_mvp19_fix2_ready_for_controlled_resend.py
          echo "ETF_EU_CONTROL_AND_TRANSPORT_FILES_OK"

      - name: Validate MVP19-FIX2 package readiness
        run: |
          python tools/validate_ucits_close_price_validation_basket_results.py \
            --artifact output/pricing/ucits_close_price_validation_basket_results_20260709_000000.json

          python tools/validate_etf_eu_delivery_package_manifest.py \
            --manifest output/delivery_package/etf_eu_delivery_package_manifest_20260709_000000.json

          python tools/validate_etf_eu_mvp19_fix2_ready_for_controlled_resend.py \
            --artifact output/client_surface/etf_eu_mvp19_fix2_ready_for_controlled_resend_20260709_000000.json

      - name: Validate EU cash-only state and no US ETF holdings
        run: |
          python tools/validate_no_us_etf_as_eu_holding.py --state output/etf_eu_portfolio_state.json
          python - <<'PY'
          import json
          from pathlib import Path
          state = json.loads(Path('output/etf_eu_portfolio_state.json').read_text(encoding='utf-8'))
          assert state.get('schema_version') == 'etf_eu_portfolio_state_v1'
          assert float(state.get('cash_eur', 0)) == 100000.0
          assert float(state.get('invested_market_value_eur', -1)) == 0.0
          assert state.get('positions') == []
          print('ETF_EU_CASH_ONLY_STATE_OK')
          PY

      - name: Validate inherited US production sender is disabled
        run: |
          if grep -q "MRKT_RPRTS_SMTP" .github/workflows/send-weekly-report.yml; then
            echo "Inherited U.S. send workflow still contains SMTP delivery configuration." >&2
            exit 1
          fi
          if grep -q "weekly_etf_report_request_" .github/workflows/send-weekly-report.yml; then
            echo "Inherited U.S. run queue trigger still active in EU repo." >&2
            exit 1
          fi
          grep -q "DISABLED_INHERITED_US_ETF_SEND_WORKFLOW" .github/workflows/send-weekly-report.yml
          echo "ETF_EU_INHERITED_SEND_DISABLED_OK"

      - name: Confirm EU rolemodel delivery mode boundary
        run: |
          case "$ETF_EU_DELIVERY_MODE" in
            validate_only)
              echo "ETF_EU_BOOTSTRAP_VALIDATION_ONLY"
              echo "No portfolio mutation, PDF generation or email delivery is performed by this mode."
              ;;
            dry_run)
              echo "ETF_EU_DELIVERY_DRY_RUN_MODE"
              echo "The EU transport runner writes dry-run evidence. No email delivery is performed."
              ;;
            send)
              echo "ETF_EU_GUARDED_SEND_REAL_TRANSPORT_PATH"
              echo "Guarded send confirmation was resolved. The isolated EU package transport runner will be used."
              ;;
          esac
          echo "UCITS pricing evidence remains non-authoritative and cannot create valuation or funding authority."
          echo "Controlled resend evidence cannot create portfolio mutation authority."
          echo "Receipt confirmation remains false unless a real mailbox or receipt check confirms receipt."

      - name: MVP20A dry-run transport evidence
        if: env.ETF_EU_DELIVERY_MODE == 'dry_run'
        run: |
          python -m runtime.send_etf_eu_delivery_package \
            --dry-run \
            --run-id "$ETF_EU_RUN_ID" \
            --report-date "$ETF_EU_PACKAGE_REPORT_DATE" \
            --report-suffix "$ETF_EU_PACKAGE_REPORT_SUFFIX" \
            --delivery-package-manifest "output/delivery_package/etf_eu_delivery_package_manifest_${ETF_EU_PACKAGE_RUN_ID}.json" \
            --ready-artifact "output/client_surface/etf_eu_mvp19_fix2_ready_for_controlled_resend_${ETF_EU_PACKAGE_RUN_ID}.json" \
            --output-dir output/delivery

          python tools/validate_etf_eu_delivery_evidence.py \
            --evidence "output/delivery/etf_eu_delivery_evidence_${ETF_EU_RUN_ID}.json"

      - name: MVP20A guarded EU package transport
        if: env.ETF_EU_DELIVERY_MODE == 'send' && env.ETF_EU_SEND_CONFIRMATION == 'confirm_guarded_send'
        env:
          MRKT_RPRTS_SMTP_HOST: ${{ secrets.MRKT_RPRTS_SMTP_HOST }}
          MRKT_RPRTS_SMTP_PORT: ${{ secrets.MRKT_RPRTS_SMTP_PORT }}
          MRKT_RPRTS_SMTP_USER: ${{ secrets.MRKT_RPRTS_SMTP_USER }}
          MRKT_RPRTS_SMTP_PASS: ${{ secrets.MRKT_RPRTS_SMTP_PASS }}
          MRKT_RPRTS_MAIL_FROM: ${{ secrets.MRKT_RPRTS_MAIL_FROM }}
          MRKT_RPRTS_MAIL_TO: ${{ secrets.MRKT_RPRTS_MAIL_TO }}
          MRKT_RPRTS_MAIL_TO_NL: ${{ secrets.MRKT_RPRTS_MAIL_TO_NL }}
          MRKT_RPRTS_SUBJECT_PREFIX_NL: ${{ vars.MRKT_RPRTS_SUBJECT_PREFIX_NL }}
        run: |
          python -m runtime.send_etf_eu_delivery_package \
            --run-id "$ETF_EU_RUN_ID" \
            --report-date "$ETF_EU_PACKAGE_REPORT_DATE" \
            --report-suffix "$ETF_EU_PACKAGE_REPORT_SUFFIX" \
            --delivery-package-manifest "output/delivery_package/etf_eu_delivery_package_manifest_${ETF_EU_PACKAGE_RUN_ID}.json" \
            --ready-artifact "output/client_surface/etf_eu_mvp19_fix2_ready_for_controlled_resend_${ETF_EU_PACKAGE_RUN_ID}.json" \
            --output-dir output/delivery

          python tools/validate_etf_eu_delivery_evidence.py \
            --evidence "output/delivery/etf_eu_delivery_evidence_${ETF_EU_RUN_ID}.json"

      - name: Build MVP20A delayed receipt check artifact
        if: env.ETF_EU_DELIVERY_MODE == 'send' && env.ETF_EU_SEND_CONFIRMATION == 'confirm_guarded_send'
        run: |
          python -m runtime.check_etf_eu_delivery_receipt \
            --run-id "$ETF_EU_RUN_ID" \
            --evidence-path "output/delivery/etf_eu_delivery_evidence_${ETF_EU_RUN_ID}.json" \
            --delay-minutes 10 \
            --output-dir output/delivery

      - name: Commit EU transport evidence artifacts
        if: env.ETF_EU_DELIVERY_MODE == 'dry_run' || env.ETF_EU_DELIVERY_MODE == 'send'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          test -f "output/delivery/etf_eu_delivery_evidence_${ETF_EU_RUN_ID}.json"
          test -f "output/delivery/etf_eu_transport_result_${ETF_EU_RUN_ID}.json"
          if [ "$ETF_EU_DELIVERY_MODE" = "send" ]; then
            test -f "output/delivery/etf_eu_receipt_check_${ETF_EU_RUN_ID}.json"
          fi

          git add -f \
            "output/delivery/etf_eu_delivery_evidence_${ETF_EU_RUN_ID}.json" \
            "output/delivery/etf_eu_transport_result_${ETF_EU_RUN_ID}.json" \
            output/delivery/etf_eu_receipt_check_*.json

          if git diff --cached --quiet; then
            echo "ETF_EU_TRANSPORT_EVIDENCE_NOT_STAGED" >&2
            exit 1
          fi

          git commit -m "Persist Weekly ETF EU transport evidence [skip ci]"
          git push origin HEAD:main
          git ls-files --error-unmatch "output/delivery/etf_eu_delivery_evidence_${ETF_EU_RUN_ID}.json"
          git ls-files --error-unmatch "output/delivery/etf_eu_transport_result_${ETF_EU_RUN_ID}.json"
          if [ "$ETF_EU_DELIVERY_MODE" = "send" ]; then
            git ls-files --error-unmatch "output/delivery/etf_eu_receipt_check_${ETF_EU_RUN_ID}.json"
          fi
          echo "ETF_EU_TRANSPORT_EVIDENCE_PERSISTED | run_id=$ETF_EU_RUN_ID"

      - name: Fail guarded send if transport failed
        if: env.ETF_EU_DELIVERY_MODE == 'send' && env.ETF_EU_SEND_CONFIRMATION == 'confirm_guarded_send'
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path
          path = Path(f"output/delivery/etf_eu_transport_result_{os.environ['ETF_EU_RUN_ID']}.json")
          data = json.loads(path.read_text(encoding='utf-8'))
          if data.get('transport_success') is not True:
              raise SystemExit(f"ETF_EU_TRANSPORT_FAILED | error={data.get('transport_error')}")
          if not data.get('message_id_or_receipt_reference'):
              raise SystemExit('ETF_EU_TRANSPORT_MISSING_MESSAGE_REFERENCE')
          print('ETF_EU_TRANSPORT_SUCCESS_EVIDENCE_COMMITTED')
          PY
