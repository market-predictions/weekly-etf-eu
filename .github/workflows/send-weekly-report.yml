name: Send weekly ETF Pro report

on:
  push:
    branches:
      - main
    paths:
      - "control/run_queue/weekly_etf_report_request_*.md"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  send-report:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system packages for PDF rendering
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcairo2 \
            libpango-1.0-0 \
            libgdk-pixbuf-2.0-0 \
            libffi-dev \
            shared-mime-info \
            fonts-liberation \
            fonts-dejavu-core \
            fonts-lato

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install matplotlib mistune weasyprint pyyaml pandas yfinance

      - name: Resolve ETF run identity
        run: |
          RUN_ID="$(date -u +'%Y%m%d_%H%M%S')"
          CLOSE_DATE="$(python - <<'PY'
          from datetime import datetime, timezone
          from pricing.run_pricing_pass import requested_close_from_now
          print(requested_close_from_now(datetime.now(timezone.utc)))
          PY
          )"
          REPORT_TOKEN="$(python - <<PY
          d='$CLOSE_DATE'
          y,m,dd=d.split('-')
          print(f'{y[2:]}{m}{dd}')
          PY
          )"
          echo "ETF_PRICING_RUN_ID=$RUN_ID" >> "$GITHUB_ENV"
          echo "MRKT_RPRTS_RUN_ID=$RUN_ID" >> "$GITHUB_ENV"
          echo "REQUESTED_CLOSE_DATE=$CLOSE_DATE" >> "$GITHUB_ENV"
          echo "REPORT_TOKEN=$REPORT_TOKEN" >> "$GITHUB_ENV"
          echo "ETF_RUN_ID=$RUN_ID | requested_close=$CLOSE_DATE | report_token=$REPORT_TOKEN"

      - name: Run persistent ETF pricing pass
        env:
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
        run: |
          pricing_log="$(python -m pricing.run_pricing_pass --requested-close-date "$REQUESTED_CLOSE_DATE" --run-id "$ETF_PRICING_RUN_ID")"
          echo "$pricing_log"
          audit_path="$(printf '%s\n' "$pricing_log" | sed -n 's/.* audit=\([^ ]*\).*/\1/p' | tail -1)"
          if [ -z "$audit_path" ] || [ ! -f "$audit_path" ]; then
            echo "Pricing pass did not emit a valid immutable audit path." >&2
            exit 1
          fi
          echo "ETF_PRICING_AUDIT_PATH=$audit_path" >> "$GITHUB_ENV"
          echo "MRKT_RPRTS_PRICING_AUDIT_PATH=$audit_path" >> "$GITHUB_ENV"
          echo "PRICING_AUDIT_PATH_OK | audit=$audit_path"

      - name: Fetch ETF historical relative strength
        env:
          MRKT_RPRTS_REPORT_MODE: pro
        run: |
          python -m runtime.fetch_etf_relative_strength \
            --config config/etf_discovery_universe.yml \
            --macro-context config/etf_macro_fundamental_context.yml \
            --period 6mo \
            --output-json output/market_history/etf_relative_strength.json

      - name: Build macro policy research pack
        env:
          MRKT_RPRTS_REPORT_MODE: pro
        run: |
          python -m runtime.build_macro_policy_pack

      - name: Validate replacement duel RS coverage
        env:
          MRKT_RPRTS_REPORT_MODE: pro
        run: |
          python tools/validate_replacement_duel_rs_coverage.py

      - name: First-pass ETF lane discovery
        env:
          MRKT_RPRTS_REPORT_MODE: pro
        run: |
          lane_log="$(python -m runtime.discover_etf_lanes \
            --config config/etf_discovery_universe.yml \
            --portfolio-state output/etf_portfolio_state.json \
            --pricing-audit "$ETF_PRICING_AUDIT_PATH" \
            --relative-strength output/market_history/etf_relative_strength.json \
            --macro-policy-pack output/macro/latest.json)"
          echo "$lane_log"
          lane_path="$(printf '%s\n' "$lane_log" | sed -n 's/.* artifact=\([^ ]*\).*/\1/p' | tail -1)"
          if [ -z "$lane_path" ] || [ ! -f "$lane_path" ]; then
            echo "Lane discovery did not emit a valid artifact path." >&2
            exit 1
          fi
          echo "ETF_LANE_ARTIFACT_PATH=$lane_path" >> "$GITHUB_ENV"
          echo "MRKT_RPRTS_LANE_ARTIFACT_PATH=$lane_path" >> "$GITHUB_ENV"
          echo "LANE_ARTIFACT_PATH_OK | artifact=$lane_path"

      - name: Price replacement-duel and discovery challengers
        env:
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
        run: |
          python -m pricing.augment_challenger_pricing \
            --pricing-audit "$ETF_PRICING_AUDIT_PATH" \
            --lane-artifact "$ETF_LANE_ARTIFACT_PATH" \
            --max-symbols 24

      - name: Validate replacement duel pricing contract
        env:
          MRKT_RPRTS_REPORT_MODE: pro
          ETF_PRICING_AUDIT_PATH: ${{ env.ETF_PRICING_AUDIT_PATH }}
        run: |
          python tools/validate_replacement_duel_pricing_contract.py

      - name: Final ETF lane discovery after challenger pricing
        env:
          MRKT_RPRTS_REPORT_MODE: pro
        run: |
          lane_log="$(python -m runtime.discover_etf_lanes \
            --config config/etf_discovery_universe.yml \
            --portfolio-state output/etf_portfolio_state.json \
            --pricing-audit "$ETF_PRICING_AUDIT_PATH" \
            --relative-strength output/market_history/etf_relative_strength.json \
            --macro-policy-pack output/macro/latest.json)"
          echo "$lane_log"
          lane_path="$(printf '%s\n' "$lane_log" | sed -n 's/.* artifact=\([^ ]*\).*/\1/p' | tail -1)"
          if [ -z "$lane_path" ] || [ ! -f "$lane_path" ]; then
            echo "Final lane discovery did not emit a valid artifact path." >&2
            exit 1
          fi
          echo "ETF_LANE_ARTIFACT_PATH=$lane_path" >> "$GITHUB_ENV"
          echo "MRKT_RPRTS_LANE_ARTIFACT_PATH=$lane_path" >> "$GITHUB_ENV"
          python -m runtime.augment_lane_artifact_with_quality_filters \
            --relative-strength output/market_history/etf_relative_strength.json \
            --macro-context config/etf_macro_fundamental_context.yml

      - name: Validate ETF challenger fundability contract
        env:
          MRKT_RPRTS_REPORT_MODE: pro
        run: |
          python tools/validate_etf_challenger_fundability_contract.py \
            --lane-artifact "$ETF_LANE_ARTIFACT_PATH" \
            --pricing-audit "$ETF_PRICING_AUDIT_PATH"

      - name: Build ETF portfolio rotation plan
        env:
          MRKT_RPRTS_REPORT_MODE: pro
        run: |
          rotation_log="$(python -m runtime.portfolio_rotation_engine \
            --portfolio-state output/etf_portfolio_state.json \
            --scorecard output/etf_recommendation_scorecard.csv \
            --pricing-audit "$ETF_PRICING_AUDIT_PATH" \
            --lane-artifact "$ETF_LANE_ARTIFACT_PATH" \
            --relative-strength output/market_history/etf_relative_strength.json \
            --run-id "$ETF_PRICING_RUN_ID" \
            --output-dir output/runtime)"
          echo "$rotation_log"
          rotation_path="$(printf '%s\n' "$rotation_log" | sed -n 's/.* plan=\([^ |]*\).*/\1/p' | tail -1)"
          if [ -z "$rotation_path" ] || [ ! -f "$rotation_path" ]; then
            echo "Portfolio rotation engine did not emit a valid rotation plan path." >&2
            exit 1
          fi
          echo "ETF_ROTATION_PLAN_PATH=$rotation_path" >> "$GITHUB_ENV"
          echo "MRKT_RPRTS_ROTATION_PLAN_PATH=$rotation_path" >> "$GITHUB_ENV"
          echo "ROTATION_PLAN_PATH_OK | plan=$rotation_path"
          python tools/validate_etf_rotation_output_contract.py --plan "$rotation_path"
          python tools/validate_etf_rotation_discipline.py --plan "$rotation_path" --warning-only

      - name: Build runtime ETF state and reports
        env:
          MRKT_RPRTS_REPORT_MODE: pro
        run: |
          state_log="$(python -m runtime.build_etf_report_state \
            --pricing-audit "$ETF_PRICING_AUDIT_PATH" \
            --lane-artifact "$ETF_LANE_ARTIFACT_PATH" \
            --rotation-plan "$ETF_ROTATION_PLAN_PATH")"
          echo "$state_log"
          runtime_state_path="$(printf '%s\n' "$state_log" | sed -n 's/.* output=\([^ |]*\).*/\1/p' | tail -1)"
          if [ -z "$runtime_state_path" ] || [ ! -f "$runtime_state_path" ]; then
            echo "Runtime state builder did not emit a valid runtime state path." >&2
            exit 1
          fi
          echo "ETF_RUNTIME_STATE_PATH=$runtime_state_path" >> "$GITHUB_ENV"
          echo "MRKT_RPRTS_RUNTIME_STATE_PATH=$runtime_state_path" >> "$GITHUB_ENV"
          render_log="$(python -m runtime.render_etf_report_from_state --output-dir output --runtime-state "$runtime_state_path")"
          echo "$render_log"
          en_path="$(printf '%s\n' "$render_log" | sed -n 's/^ETF_RUNTIME_RENDER_OK | en=\([^|]*\) | nl=.*/\1/p' | xargs)"
          nl_path="$(printf '%s\n' "$render_log" | sed -n 's/^ETF_RUNTIME_RENDER_OK | en=[^|]* | nl=\([^|]*\).*/\1/p' | xargs)"
          if [ -z "$en_path" ] || [ ! -f "$en_path" ]; then
            echo "Runtime renderer did not emit a valid English report path." >&2
            exit 1
          fi
          if [ -z "$nl_path" ] || [ ! -f "$nl_path" ]; then
            echo "Runtime renderer did not emit a valid Dutch report path." >&2
            exit 1
          fi
          export MRKT_RPRTS_EXPLICIT_REPORT_PATH="$en_path"
          export MRKT_RPRTS_EXPLICIT_REPORT_PATH_NL="$nl_path"
          export MRKT_RPRTS_RUNTIME_STATE_PATH="$runtime_state_path"
          export ETF_RUNTIME_STATE_PATH="$runtime_state_path"
          echo "MRKT_RPRTS_EXPLICIT_REPORT_PATH=$en_path" >> "$GITHUB_ENV"
          echo "MRKT_RPRTS_EXPLICIT_REPORT_PATH_NL=$nl_path" >> "$GITHUB_ENV"
          echo "MRKT_RPRTS_RUNTIME_STATE_PATH=$runtime_state_path" >> "$GITHUB_ENV"
          echo "ETF_RUNTIME_STATE_PATH=$runtime_state_path" >> "$GITHUB_ENV"
          echo "RUNTIME_REPORT_PATHS_OK | en=$en_path | nl=$nl_path | runtime_state=$runtime_state_path"
          python -m runtime.add_etf_pricing_basis_section --output-dir output --runtime-state "$runtime_state_path" --pricing-audit "$ETF_PRICING_AUDIT_PATH"
          python -m runtime.polish_runtime_reports --output-dir output --runtime-state "$runtime_state_path"
          python -m runtime.fix_report_output_contract --output-dir output --runtime-state "$runtime_state_path"
          python -m runtime.add_etf_position_performance_section --output-dir output
          python -m runtime.apply_nl_localization --output-dir output
          python -m runtime.scrub_nl_client_language --output-dir output
          python -m runtime.scrub_nl_pdf_audit_leaks --output-dir output
          python -m runtime.localize_nl_report_dates --output-dir output
          python -m runtime.link_runtime_report_tickers --output-dir output
          execution_log="$(python -m runtime.model_execution_engine \
            --runtime-state "$runtime_state_path" \
            --portfolio-state output/etf_portfolio_state.json \
            --trade-ledger output/etf_trade_ledger.csv \
            --mode shadow \
            --output-dir output/runtime)"
          echo "$execution_log"
          model_execution_path="$(printf '%s\n' "$execution_log" | sed -n 's/^ETF_MODEL_EXECUTION_OK | artifact=\([^|]*\) |.*/\1/p' | xargs)"
          if [ -z "$model_execution_path" ] || [ ! -f "$model_execution_path" ]; then
            echo "Model execution engine did not emit a valid shadow artifact path." >&2
            exit 1
          fi
          export ETF_MODEL_EXECUTION_PATH="$model_execution_path"
          export MRKT_RPRTS_MODEL_EXECUTION_PATH="$model_execution_path"
          echo "ETF_MODEL_EXECUTION_PATH=$model_execution_path" >> "$GITHUB_ENV"
          echo "MRKT_RPRTS_MODEL_EXECUTION_PATH=$model_execution_path" >> "$GITHUB_ENV"
          python tools/validate_etf_model_execution.py --artifact "$model_execution_path" --expected-mode shadow
          python tools/write_weekly_etf_run_manifest.py \
            --run-id "$ETF_PRICING_RUN_ID" \
            --requested-close-date "$REQUESTED_CLOSE_DATE" \
            --report-token "$REPORT_TOKEN" \
            --pricing-audit "$ETF_PRICING_AUDIT_PATH" \
            --runtime-state "$runtime_state_path" \
            --english-report "$en_path" \
            --dutch-report "$nl_path" \
            --status runtime_reports_built

      - name: Validate ETF pricing basis disclosure
        env:
          MRKT_RPRTS_REPORT_MODE: pro
        run: |
          python tools/validate_etf_pricing_basis_disclosure.py --output-dir output

      - name: Validate ETF ticker links
        env:
          MRKT_RPRTS_REPORT_MODE: pro
        run: |
          python tools/validate_etf_ticker_links.py --output-dir output

      - name: Validate ETF equity curve history contract
        env:
          MRKT_RPRTS_REPORT_MODE: pro
        run: |
          python tools/validate_etf_equity_curve_history.py --output-dir output --min-points 3

      - name: Validate ETF position performance section
        env:
          MRKT_RPRTS_REPORT_MODE: pro
        run: |
          python tools/validate_etf_position_performance_section.py --output-dir output

      - name: Validate ETF report content contract
        env:
          MRKT_RPRTS_REPORT_MODE: pro
        run: |
          python tools/validate_etf_report_content_contract.py --output-dir output

      - name: Validate Dutch language quality contract
        env:
          MRKT_RPRTS_REPORT_MODE: pro
        run: |
          python tools/validate_etf_dutch_language_quality.py --output-dir output
          python tools/validate_etf_dutch_client_surface_clean.py --output-dir output

      - name: Validate persisted pricing audit after runtime render
        run: |
          python pricing/validate_persisted_audit.py

      - name: Persist successful ETF valuation state
        env:
          MRKT_RPRTS_REPORT_MODE: pro
        run: |
          python -m runtime.persist_etf_valuation_state \
            --runtime-state "$ETF_RUNTIME_STATE_PATH" \
            --pricing-audit "$ETF_PRICING_AUDIT_PATH" \
            --english-report "$MRKT_RPRTS_EXPLICIT_REPORT_PATH" \
            --portfolio-state output/etf_portfolio_state.json \
            --valuation-history output/etf_valuation_history.csv
          python tools/validate_etf_persisted_valuation_state.py \
            --runtime-state "$ETF_RUNTIME_STATE_PATH" \
            --portfolio-state output/etf_portfolio_state.json \
            --valuation-history output/etf_valuation_history.csv
          python tools/write_weekly_etf_run_manifest.py \
            --run-id "$ETF_PRICING_RUN_ID" \
            --requested-close-date "$REQUESTED_CLOSE_DATE" \
            --report-token "$REPORT_TOKEN" \
            --pricing-audit "$ETF_PRICING_AUDIT_PATH" \
            --runtime-state "$ETF_RUNTIME_STATE_PATH" \
            --english-report "$MRKT_RPRTS_EXPLICIT_REPORT_PATH" \
            --dutch-report "$MRKT_RPRTS_EXPLICIT_REPORT_PATH_NL" \
            --portfolio-state output/etf_portfolio_state.json \
            --valuation-history output/etf_valuation_history.csv \
            --status valuation_state_persisted

      - name: Execute guarded ETF model rotation
        env:
          MRKT_RPRTS_REPORT_MODE: pro
        run: |
          python tools/validate_etf_trade_ledger_idempotency.py --trade-ledger output/etf_trade_ledger.csv
          execution_log="$(python -m runtime.model_execution_guarded_auto \
            --runtime-state "$ETF_RUNTIME_STATE_PATH" \
            --portfolio-state output/etf_portfolio_state.json \
            --trade-ledger output/etf_trade_ledger.csv \
            --output-dir output/runtime)"
          echo "$execution_log"
          model_execution_path="$(printf '%s\n' "$execution_log" | sed -n 's/^ETF_MODEL_EXECUTION_OK | artifact=\([^|]*\) |.*/\1/p' | xargs)"
          if [ -z "$model_execution_path" ] || [ ! -f "$model_execution_path" ]; then
            echo "Model execution engine did not emit a valid guarded-auto artifact path." >&2
            exit 1
          fi
          echo "ETF_MODEL_EXECUTION_PATH=$model_execution_path" >> "$GITHUB_ENV"
          echo "MRKT_RPRTS_MODEL_EXECUTION_PATH=$model_execution_path" >> "$GITHUB_ENV"
          python tools/validate_etf_model_execution.py --artifact "$model_execution_path" --expected-mode guarded_auto
          python tools/validate_etf_trade_ledger_idempotency.py --trade-ledger output/etf_trade_ledger.csv

      - name: Validate lane breadth proof before render
        env:
          MRKT_RPRTS_REPORT_MODE: pro
        run: |
          python validate_lane_breadth.py

      - name: Validate replacement duel pricing proof before render
        env:
          MRKT_RPRTS_REPORT_MODE: pro
        run: |
          python validate_replacement_duels.py

      - name: Validate English/Dutch paired report set if present
        env:
          MRKT_RPRTS_REPORT_MODE: pro
        run: |
          python - <<'PY'
          from pathlib import Path
          import send_report_runtime_html as srh
          sr = srh.report_module

          output_dir = Path("output")
          latest = sr.latest_report_file(output_dir, mode="pro")
          if sr.has_matching_dutch_report(latest):
              sr.validate_bilingual_pair(latest)
              print(f"BILINGUAL_PAIR_OK | en={latest.name} | nl={sr.matching_dutch_report_path(latest).name}")
          else:
              print(f"BILINGUAL_PAIR_SKIPPED | en={latest.name} | reason=no_matching_dutch_companion")
          PY

      - name: Validate HTML/PDF render before send
        env:
          MRKT_RPRTS_REPORT_MODE: pro
        run: |
          python - <<'PY'
          from pathlib import Path
          import send_report_runtime_html as srh
          sr = srh.report_module
          output_dir = Path("output")
          latest = sr.latest_report_file(output_dir, mode="pro")
          bundle = sr.generate_delivery_assets_for_run(output_dir, latest, mode="pro")
          if bundle.get("bilingual"):
              print(f"RENDER_OK | mode=pro_bilingual | report_en={bundle['en']['report_path'].name} | report_nl={bundle['nl']['report_path'].name}")
          else:
              print(f"RENDER_OK | mode=pro | report={bundle['en']['report_path'].name}")
          PY

      - name: Validate ETF delivery HTML contract
        env:
          MRKT_RPRTS_REPORT_MODE: pro
        run: |
          python tools/validate_etf_delivery_html_contract.py --output-dir output
          python tools/validate_etf_client_surface_clean.py --output-dir output

      - name: Validate ETF explicit state derivation before send
        env:
          MRKT_RPRTS_REPORT_MODE: pro
        run: |
          python tools/write_etf_minimum_state.py --output-dir output --mode pro --check-only
          python tools/write_etf_trade_ledger.py --output-dir output --check-only
          python tools/write_etf_recommendation_scorecard.py --output-dir output --mode pro --check-only

      - name: Send email
        env:
          MRKT_RPRTS_REPORT_MODE: pro
          MRKT_RPRTS_SUBJECT_PREFIX: Weekly ETF Pro Review
          MRKT_RPRTS_SUBJECT_PREFIX_NL: Weekly ETF Pro Review | Nederlands
          MRKT_RPRTS_SMTP_HOST: ${{ secrets.MRKT_RPRTS_SMTP_HOST }}
          MRKT_RPRTS_SMTP_PORT: ${{ secrets.MRKT_RPRTS_SMTP_PORT }}
          MRKT_RPRTS_SMTP_USER: ${{ secrets.MRKT_RPRTS_SMTP_USER }}
          MRKT_RPRTS_SMTP_PASS: ${{ secrets.MRKT_RPRTS_SMTP_PASS }}
          MRKT_RPRTS_MAIL_FROM: ${{ secrets.MRKT_RPRTS_MAIL_FROM }}
          MRKT_RPRTS_MAIL_TO: ${{ secrets.MRKT_RPRTS_MAIL_TO }}
          MRKT_RPRTS_MAIL_TO_NL: ${{ secrets.MRKT_RPRTS_MAIL_TO_NL }}
        run: python send_report_runtime_html.py

      - name: Write final ETF run manifest
        if: always()
        run: |
          python tools/write_weekly_etf_run_manifest.py \
            --run-id "$ETF_PRICING_RUN_ID" \
            --requested-close-date "$REQUESTED_CLOSE_DATE" \
            --report-token "$REPORT_TOKEN" \
            --pricing-audit "${ETF_PRICING_AUDIT_PATH:-}" \
            --runtime-state "${ETF_RUNTIME_STATE_PATH:-}" \
            --english-report "${MRKT_RPRTS_EXPLICIT_REPORT_PATH:-}" \
            --dutch-report "${MRKT_RPRTS_EXPLICIT_REPORT_PATH_NL:-}" \
            --portfolio-state output/etf_portfolio_state.json \
            --valuation-history output/etf_valuation_history.csv \
            --status "workflow_${{ job.status }}" \
            --conclusion "${{ job.status }}"

      - name: Commit ETF run artifacts back to main
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            output/weekly_analysis_pro_*.md \
            output/weekly_analysis_pro_*_clean.md \
            output/weekly_analysis_pro_*_delivery.html \
            output/weekly_analysis_pro_*.pdf \
            output/weekly_analysis_pro_*_equity_curve.png \
            output/pricing/*.json \
            output/pricing/*.txt \
            output/runtime/*.json \
            output/runtime/*.txt \
            output/run_manifests/*.json \
            output/run_manifests/*.txt \
            output/market_history/*.json \
            output/lane_reviews/*.json \
            output/macro/*.json \
            output/etf_portfolio_state.json \
            output/etf_valuation_history.csv \
            output/etf_trade_ledger.csv \
            output/etf_recommendation_scorecard.csv || true
          if git diff --cached --quiet; then
            echo "No ETF run artifacts to commit."
            exit 0
          fi
          git commit -m "Persist Weekly ETF run artifacts and manifest [skip ci]"
          git push origin HEAD:main
