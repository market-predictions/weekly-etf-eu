name: Validate Weekly ETF EU v2 production promotion

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "control/run_queue/etf_eu_v2_promotion_smoke_request_*.md"

permissions:
  actions: read
  contents: read

jobs:
  promotion-smoke:
    runs-on: ubuntu-latest
    env:
      SOURCE_WORKFLOW_RUN_ID: "29455425268"
      SOURCE_ARTIFACT_NAME: "etf-eu-current-date-v2-comparison-20260715_213100"
      SMOKE_RUN_ID: "20260715_224700"
      REPORT_DATE: "2026-07-15"
      REPORT_SUFFIX: "260715"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install render dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2 libpango-1.0-0 libgdk-pixbuf-2.0-0 libffi-dev shared-mime-info fonts-liberation fonts-dejavu-core fonts-lato poppler-utils
          python -m pip install --upgrade pip
          pip install pyyaml mistune weasyprint

      - name: Download validated current-date inputs
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.SOURCE_ARTIFACT_NAME }}
          path: downloaded
          github-token: ${{ github.token }}
          run-id: ${{ env.SOURCE_WORKFLOW_RUN_ID }}

      - name: Build promoted production package
        run: |
          set -euo pipefail
          SOURCE_BASE="downloaded/current_date_comparison/20260715_213100"
          OUTPUT_DIR="output/promotion_smoke/${SMOKE_RUN_ID}"
          python -m tools.build_etf_eu_routine_report_package_v2 \
            --run-id "$SMOKE_RUN_ID" \
            --report-date "$REPORT_DATE" \
            --report-suffix "$REPORT_SUFFIX" \
            --pricing-artifact "downloaded/pricing/ucits_close_price_validation_basket_results_20260715_213100.json" \
            --macro-pack "${SOURCE_BASE}/macro/etf_eu_macro_policy_pack_20260715_213100.json" \
            --registry config/ucits_symbol_registry.yml \
            --output-dir "$OUTPUT_DIR" \
            --portfolio-state output/etf_eu_portfolio_state.json \
            --valuation-history "${SOURCE_BASE}/state/etf_eu_valuation_history.csv" \
            --trade-ledger output/etf_eu_trade_ledger.csv \
            --recommendation-scorecard output/etf_eu_recommendation_scorecard.csv \
            --previous-routine-manifest output/run_manifests/etf_eu_routine_run_manifest_2026-07-12_20260712_125000.json \
            --previous-delivery-closeout-manifest output/delivery_control/etf_eu_corrected_delivery_closeout_20260713_180000.json

      - name: Strictly validate promoted package
        run: |
          set -euo pipefail
          OUTPUT_DIR="output/promotion_smoke/${SMOKE_RUN_ID}"
          STATE="output/runtime/etf_eu_client_grade_report_state_${SMOKE_RUN_ID}.json"
          VALIDATION="output/quality/etf_eu_client_grade_v2_validation_${SMOKE_RUN_ID}.json"
          mkdir -p output/quality
          python -m tools.validate_etf_eu_client_grade_report_v2 \
            --state "$STATE" \
            --dutch-html "${OUTPUT_DIR}/weekly_etf_eu_review_nl_${REPORT_SUFFIX}.html" \
            --dutch-pdf "${OUTPUT_DIR}/weekly_etf_eu_review_nl_${REPORT_SUFFIX}.pdf" \
            --english-html "${OUTPUT_DIR}/weekly_etf_eu_review_${REPORT_SUFFIX}.html" \
            --english-pdf "${OUTPUT_DIR}/weekly_etf_eu_review_${REPORT_SUFFIX}.pdf" \
            --output "$VALIDATION" \
            --strict
          python -m tools.write_etf_eu_routine_v2_machine_gate \
            --validation "$VALIDATION" \
            --run-id "$SMOKE_RUN_ID" \
            --output-dir output/quality

      - name: Render all pages for visual confirmation
        run: |
          set -euo pipefail
          OUTPUT_DIR="output/promotion_smoke/${SMOKE_RUN_ID}"
          REVIEW_DIR="${OUTPUT_DIR}/pages"
          mkdir -p "${REVIEW_DIR}/nl" "${REVIEW_DIR}/en"
          pdftoppm -png -r 120 "${OUTPUT_DIR}/weekly_etf_eu_review_nl_${REPORT_SUFFIX}.pdf" "${REVIEW_DIR}/nl/page"
          pdftoppm -png -r 120 "${OUTPUT_DIR}/weekly_etf_eu_review_${REPORT_SUFFIX}.pdf" "${REVIEW_DIR}/en/page"

      - name: Upload promotion smoke evidence
        uses: actions/upload-artifact@v4
        with:
          name: etf-eu-v2-promotion-smoke-${{ env.SMOKE_RUN_ID }}
          path: |
            output/promotion_smoke/${{ env.SMOKE_RUN_ID }}
            output/runtime/etf_eu_client_grade_report_state_${{ env.SMOKE_RUN_ID }}.json
            output/quality/etf_eu_client_grade_v2_validation_${{ env.SMOKE_RUN_ID }}.json
            output/quality/etf_eu_routine_pdf_client_grade_${{ env.SMOKE_RUN_ID }}*.json
