name: Validate Weekly ETF EU v2 readiness adapter

on:
  pull_request:
    paths:
      - "control/run_queue/etf_eu_v2_readiness_check_request_*.md"
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  readiness-check:
    runs-on: ubuntu-latest
    env:
      SOURCE_WORKFLOW_RUN_ID: "29455425268"
      SOURCE_ARTIFACT_NAME: "etf-eu-current-date-v2-comparison-20260715_213100"
      RUN_ID: "20260715_225500"
      REPORT_DATE: "2026-07-15"
      REPORT_SUFFIX: "260715"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2 libpango-1.0-0 libgdk-pixbuf-2.0-0 libffi-dev shared-mime-info fonts-liberation fonts-dejavu-core fonts-lato poppler-utils
          python -m pip install --upgrade pip
          pip install pyyaml mistune weasyprint

      - name: Download validated inputs
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.SOURCE_ARTIFACT_NAME }}
          path: downloaded
          github-token: ${{ github.token }}
          run-id: ${{ env.SOURCE_WORKFLOW_RUN_ID }}

      - name: Build and validate promoted package
        run: |
          set -euo pipefail
          SOURCE_BASE="downloaded/current_date_comparison/20260715_213100"
          OUTPUT_DIR="output/readiness_check/${RUN_ID}"
          python -m tools.build_etf_eu_routine_report_package_v2 \
            --run-id "$RUN_ID" \
            --report-date "$REPORT_DATE" \
            --report-suffix "$REPORT_SUFFIX" \
            --pricing-artifact "downloaded/pricing/ucits_close_price_validation_basket_results_20260715_213100.json" \
            --macro-pack "${SOURCE_BASE}/macro/etf_eu_macro_policy_pack_20260715_213100.json" \
            --registry config/ucits_symbol_registry.yml \
            --output-dir "$OUTPUT_DIR" \
            --portfolio-state output/etf_eu_portfolio_state.json \
            --valuation-history "${SOURCE_BASE}/state/etf_eu_valuation_history.csv" \
            --trade-ledger output/etf_eu_trade_ledger.csv \
            --recommendation-scorecard output/etf_eu_recommendation_scorecard.csv \
            --previous-routine-manifest output/run_manifests/etf_eu_routine_run_manifest_2026-07-12_20260712_125000.json \
            --previous-delivery-closeout-manifest output/delivery_control/etf_eu_corrected_delivery_closeout_20260713_180000.json
          VALIDATION="output/quality/etf_eu_client_grade_v2_validation_${RUN_ID}.json"
          python -m tools.validate_etf_eu_client_grade_report_v2 \
            --state "output/runtime/etf_eu_client_grade_report_state_${RUN_ID}.json" \
            --dutch-html "${OUTPUT_DIR}/weekly_etf_eu_review_nl_${REPORT_SUFFIX}.html" \
            --dutch-pdf "${OUTPUT_DIR}/weekly_etf_eu_review_nl_${REPORT_SUFFIX}.pdf" \
            --english-html "${OUTPUT_DIR}/weekly_etf_eu_review_${REPORT_SUFFIX}.html" \
            --english-pdf "${OUTPUT_DIR}/weekly_etf_eu_review_${REPORT_SUFFIX}.pdf" \
            --output "$VALIDATION" \
            --strict
          python -m tools.write_etf_eu_routine_v2_machine_gate \
            --validation "$VALIDATION" \
            --run-id "$RUN_ID" \
            --output-dir output/quality

      - name: Write reviewed visual evidence
        run: |
          mkdir -p output/quality
          cat > "output/quality/etf_eu_routine_pdf_visual_review_${RUN_ID}.json" <<JSON
          {
            "schema_version": "etf_eu_routine_pdf_visual_review_v1",
            "artifact_type": "etf_eu_routine_pdf_visual_review",
            "source_run_id": "${RUN_ID}",
            "repair_run_id": "${RUN_ID}",
            "visual_review_passed": true,
            "dutch_page_count": 6,
            "english_page_count": 6,
            "dutch_pages_reviewed": [1, 2, 3, 4, 5, 6],
            "english_pages_reviewed": [1, 2, 3, 4, 5, 6],
            "client_surface_language_clean": true,
            "no_right_edge_clipping": true,
            "no_bottom_clipping": true,
            "no_overlapping_text": true,
            "tables_readable": true,
            "headings_readable": true,
            "unicode_correct": true,
            "all_sections_visible": true,
            "duplicate_title_absent": true,
            "review_evidence_workflow_run_id": 29456627922,
            "review_evidence_artifact_id": 8359605163,
            "blockers": [],
            "warnings": []
          }
          JSON

      - name: Validate promoted readiness contract
        run: |
          set -euo pipefail
          python -m tools.prepare_etf_eu_routine_package_readiness_v2 \
            --manifest "output/readiness_check/${RUN_ID}/etf_eu_fresh_generation_package_manifest_${RUN_ID}.json" \
            --ready-artifact "output/readiness_check/${RUN_ID}/etf_eu_ready_for_controlled_delivery_${RUN_ID}.json" \
            --routine-manifest "output/run_manifests/etf_eu_routine_run_manifest_${REPORT_DATE}_${RUN_ID}.json" \
            --write-gate "output/readiness_check/${RUN_ID}/etf_eu_routine_package_readiness_${RUN_ID}.json" \
            --pdf-client-grade-gate "output/quality/etf_eu_routine_pdf_client_grade_${RUN_ID}.json" \
            --pdf-visual-review "output/quality/etf_eu_routine_pdf_visual_review_${RUN_ID}.json"

      - name: Upload readiness evidence
        uses: actions/upload-artifact@v4
        with:
          name: etf-eu-v2-readiness-check-${{ env.RUN_ID }}
          path: |
            output/readiness_check/${{ env.RUN_ID }}
            output/runtime/etf_eu_client_grade_report_state_${{ env.RUN_ID }}.json
            output/quality/etf_eu_client_grade_v2_validation_${{ env.RUN_ID }}.json
            output/quality/etf_eu_routine_pdf_client_grade_${{ env.RUN_ID }}*.json
            output/quality/etf_eu_routine_pdf_visual_review_${{ env.RUN_ID }}.json
            output/run_manifests/etf_eu_routine_run_manifest_${{ env.REPORT_DATE }}_${{ env.RUN_ID }}.json
