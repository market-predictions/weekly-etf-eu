name: Yahoo fallback gate validation

on:
  push:
    branches:
      - main
    paths:
      - "control/run_queue/yahoo_fallback_gate_validation_*.md"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate-yahoo-fallback-gates:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml yfinance

      - name: Resolve run identity
        run: |
          RUN_ID="$(date -u +'%Y%m%d_%H%M%S')"
          echo "YAHOO_GATE_RUN_ID=$RUN_ID" >> "$GITHUB_ENV"
          echo "YAHOO_GATE_RUN_ID=$RUN_ID"

      - name: Validate contract files exist
        run: |
          test -f control/SYSTEM_INDEX.md
          test -f control/CURRENT_STATE.md
          test -f control/NEXT_ACTIONS.md
          test -f control/YAHOO_VERIFIED_FALLBACK_CONTRACT_V1.md
          test -f config/ucits_pricing_source_policy.yml
          test -f config/ucits_exchange_session_policy.yml
          test -f config/issuer_reference_policy.yml
          echo "YAHOO_FALLBACK_CONTRACT_FILES_OK"

      - name: Build and validate Yahoo UCITS close diagnostics
        run: |
          python -m pricing.build_yahoo_ucits_close_diagnostics \
            --source-policy config/ucits_pricing_source_policy.yml \
            --output-dir output/pricing \
            --run-id "$YAHOO_GATE_RUN_ID"
          python tools/validate_yahoo_ucits_close_diagnostics.py \
            --artifact "output/pricing/yahoo_ucits_close_diagnostics_${YAHOO_GATE_RUN_ID}.json"

      - name: Build and validate Yahoo fallback gate evaluation
        run: |
          python -m pricing.build_yahoo_fallback_gate_evaluation \
            --yahoo-diagnostics "output/pricing/yahoo_ucits_close_diagnostics_${YAHOO_GATE_RUN_ID}.json" \
            --output-dir output/pricing \
            --run-id "$YAHOO_GATE_RUN_ID"
          python tools/validate_yahoo_fallback_gate_evaluation.py \
            --artifact "output/pricing/yahoo_fallback_gate_evaluation_${YAHOO_GATE_RUN_ID}.json"

      - name: Build and validate Yahoo completed-session gate
        run: |
          python -m pricing.build_yahoo_completed_session_gate \
            --fallback-gate-evaluation "output/pricing/yahoo_fallback_gate_evaluation_${YAHOO_GATE_RUN_ID}.json" \
            --session-policy config/ucits_exchange_session_policy.yml \
            --output-dir output/pricing \
            --run-id "$YAHOO_GATE_RUN_ID"
          python tools/validate_yahoo_completed_session_gate.py \
            --artifact "output/pricing/yahoo_completed_session_gate_${YAHOO_GATE_RUN_ID}.json"

      - name: Discover Twelve Data UCITS provider symbols
        env:
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
          TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY }}
        run: |
          python -m pricing.discover_twelve_data_ucits_symbols \
            --source-policy config/ucits_pricing_source_policy.yml \
            --output-dir output/pricing \
            --run-id "$YAHOO_GATE_RUN_ID"
          python tools/validate_ucits_twelve_data_symbol_discovery.py \
            --artifact "output/pricing/ucits_twelve_data_symbol_discovery_${YAHOO_GATE_RUN_ID}.json"

      - name: Build and validate Yahoo cross-source gate
        run: |
          python -m pricing.build_yahoo_cross_source_gate \
            --yahoo-diagnostics "output/pricing/yahoo_ucits_close_diagnostics_${YAHOO_GATE_RUN_ID}.json" \
            --completed-session-gate "output/pricing/yahoo_completed_session_gate_${YAHOO_GATE_RUN_ID}.json" \
            --twelve-data-discovery "output/pricing/ucits_twelve_data_symbol_discovery_${YAHOO_GATE_RUN_ID}.json" \
            --output-dir output/pricing \
            --run-id "$YAHOO_GATE_RUN_ID"
          python tools/validate_yahoo_cross_source_gate.py \
            --artifact "output/pricing/yahoo_cross_source_gate_${YAHOO_GATE_RUN_ID}.json"

      - name: Build and validate issuer reference sanity gate
        run: |
          python -m pricing.build_issuer_reference_sanity_gate \
            --yahoo-diagnostics "output/pricing/yahoo_ucits_close_diagnostics_${YAHOO_GATE_RUN_ID}.json" \
            --cross-source-gate "output/pricing/yahoo_cross_source_gate_${YAHOO_GATE_RUN_ID}.json" \
            --issuer-policy config/issuer_reference_policy.yml \
            --output-dir output/pricing \
            --run-id "$YAHOO_GATE_RUN_ID"
          python tools/validate_issuer_reference_sanity_gate.py \
            --artifact "output/pricing/issuer_reference_sanity_gate_${YAHOO_GATE_RUN_ID}.json"

      - name: Build and validate iShares reference endpoint discovery
        run: |
          python -m pricing.build_ishares_reference_endpoint_discovery \
            --issuer-policy config/issuer_reference_policy.yml \
            --output-dir output/pricing \
            --run-id "$YAHOO_GATE_RUN_ID"
          python tools/validate_ishares_reference_endpoint_discovery.py \
            --artifact "output/pricing/ishares_reference_endpoint_discovery_${YAHOO_GATE_RUN_ID}.json"

      - name: Build and validate iShares endpoint evidence
        run: |
          python -m pricing.build_ishares_endpoint_evidence \
            --endpoint-discovery "output/pricing/ishares_reference_endpoint_discovery_${YAHOO_GATE_RUN_ID}.json" \
            --issuer-policy config/issuer_reference_policy.yml \
            --output-dir output/pricing \
            --run-id "$YAHOO_GATE_RUN_ID"
          python tools/validate_ishares_endpoint_evidence.py \
            --artifact "output/pricing/ishares_endpoint_evidence_${YAHOO_GATE_RUN_ID}.json"

      - name: Build and validate Yahoo fallback gate shadow evidence
        run: |
          python tools/build_yahoo_fallback_gate_shadow_evidence.py \
            --run-id "$YAHOO_GATE_RUN_ID" \
            --output-dir output/validation
          python tools/validate_yahoo_fallback_gate_shadow_evidence.py \
            --artifact "output/validation/yahoo_fallback_gate_shadow_evidence_${YAHOO_GATE_RUN_ID}.json"

      - name: Confirm no authority is created
        run: |
          echo "Yahoo fallback gate evaluation is diagnostic-only."
          echo "Completed-session gate is diagnostic-only."
          echo "Cross-source gate is diagnostic-only and remains blocked without independent close data."
          echo "Issuer reference sanity gate is diagnostic-only and not a trading-line close authority."
          echo "iShares endpoint discovery is diagnostic-only and does not extract NAV/reference prices."
          echo "iShares endpoint evidence is diagnostic-only and records structure/field signals only."
          echo "No valuation authority, funding authority, portfolio mutation, PDF generation or email delivery is created."

      - name: Commit Yahoo fallback gate artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/pricing/yahoo_ucits_close_diagnostics_*.json output/pricing/yahoo_fallback_gate_evaluation_*.json output/pricing/yahoo_completed_session_gate_*.json output/pricing/ucits_twelve_data_symbol_discovery_*.json output/pricing/yahoo_cross_source_gate_*.json output/pricing/issuer_reference_sanity_gate_*.json output/pricing/ishares_reference_endpoint_discovery_*.json output/pricing/ishares_endpoint_evidence_*.json output/validation/yahoo_fallback_gate_shadow_evidence_*.json || true
          if git diff --cached --quiet; then
            echo "No Yahoo fallback gate artifacts to commit."
            exit 0
          fi
          git commit -m "Persist Yahoo fallback gate validation artifacts [skip ci]"
          git push origin HEAD:main
