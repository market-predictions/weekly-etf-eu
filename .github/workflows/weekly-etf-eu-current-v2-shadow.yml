name: Weekly ETF EU current-date v2 shadow comparison

on:
  pull_request:
    paths:
      - "control/run_queue/etf_eu_current_v2_shadow_request_*.md"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  current-v2-shadow:
    runs-on: ubuntu-latest
    env:
      RUN_ID: "20260716_004315"
      REPORT_DATE: "2026-07-16"
      REPORT_SUFFIX: "260716"
      MACRO_ARTIFACT: "output/macro/etf_eu_macro_policy_pack_2026-07-16_20260716_004315.json"
      PRICING_ARTIFACT: "output/pricing/ucits_close_price_validation_basket_results_20260716_004315.json"
      PREVIEW_DIR: "output/client_grade_preview/20260716_004315"
      LEGACY_DIR: "output/fresh_generation"
      HISTORY_SHADOW: "output/runtime/etf_eu_valuation_history_20260716_004315.csv"
      STATE_ARTIFACT: "output/runtime/etf_eu_client_grade_report_state_20260716_004315.json"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install render and pricing dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2 libpango-1.0-0 libgdk-pixbuf-2.0-0 libffi-dev shared-mime-info fonts-liberation fonts-dejavu-core fonts-lato poppler-utils
          python -m pip install --upgrade pip
          pip install pyyaml yfinance mistune weasyprint

      - name: Build fresh UCITS pricing evidence
        run: |
          set -euo pipefail
          python pricing/build_ucits_close_price_validation_basket_results.py \
            --run-id "$RUN_ID" \
            --pause-seconds 15 \
            --rate-limit-cooldown-seconds 600 \
            --max-attempts 2 \
            --rate-limit-mode stop
          python tools/validate_ucits_close_price_validation_basket_results.py \
            --artifact "$PRICING_ARTIFACT"

      - name: Build current production-format shadow
        run: |
          set -euo pipefail
          python -m tools.build_etf_eu_routine_report_package \
            --run-id "$RUN_ID" \
            --report-date "$REPORT_DATE" \
            --report-suffix "$REPORT_SUFFIX" \
            --pricing-artifact "$PRICING_ARTIFACT" \
            --previous-routine-manifest output/run_manifests/etf_eu_routine_run_manifest_2026-07-12_20260712_125000.json \
            --previous-delivery-closeout-manifest output/delivery_control/etf_eu_corrected_delivery_closeout_20260713_180000.json

      - name: Build current valuation-history shadow
        run: |
          set -euo pipefail
          mkdir -p output/runtime
          python tools/update_etf_eu_valuation_history.py \
            --portfolio-state output/etf_eu_portfolio_state.json \
            --history output/etf_eu_valuation_history.csv \
            --report-date "$REPORT_DATE" \
            --source-report "weekly_etf_eu_client_grade_v2_${REPORT_SUFFIX}" \
            --comment "Current-date v2 shadow valuation observation; no portfolio mutation" \
            --output "$HISTORY_SHADOW"

      - name: Build normalized current EU report state
        run: |
          set -euo pipefail
          python -m runtime.build_etf_eu_client_grade_report_state \
            --portfolio-state output/etf_eu_portfolio_state.json \
            --valuation-history "$HISTORY_SHADOW" \
            --pricing-artifact "$PRICING_ARTIFACT" \
            --macro-pack "$MACRO_ARTIFACT" \
            --registry config/ucits_symbol_registry.yml \
            --run-id "$RUN_ID" \
            --source-run-id "$RUN_ID" \
            --report-date "$REPORT_DATE" \
            --report-suffix "$REPORT_SUFFIX" \
            --output "$STATE_ARTIFACT"

      - name: Render and polish current v2 shadow
        run: |
          set -euo pipefail
          mkdir -p "$PREVIEW_DIR" output/quality
          python -m runtime.render_etf_eu_client_grade_v2 \
            --state "$STATE_ARTIFACT" \
            --language nl \
            --html-output "$PREVIEW_DIR/weekly_etf_eu_client_grade_nl_${REPORT_SUFFIX}.html" \
            --pdf-output "$PREVIEW_DIR/weekly_etf_eu_client_grade_nl_${REPORT_SUFFIX}.pdf"
          python -m runtime.render_etf_eu_client_grade_v2 \
            --state "$STATE_ARTIFACT" \
            --language en \
            --html-output "$PREVIEW_DIR/weekly_etf_eu_client_grade_${REPORT_SUFFIX}.html" \
            --pdf-output "$PREVIEW_DIR/weekly_etf_eu_client_grade_${REPORT_SUFFIX}.pdf"
          python -m runtime.polish_etf_eu_client_grade_html \
            --html "$PREVIEW_DIR/weekly_etf_eu_client_grade_nl_${REPORT_SUFFIX}.html" \
            --language nl \
            --pdf "$PREVIEW_DIR/weekly_etf_eu_client_grade_nl_${REPORT_SUFFIX}.pdf"
          python -m runtime.polish_etf_eu_client_grade_html \
            --html "$PREVIEW_DIR/weekly_etf_eu_client_grade_${REPORT_SUFFIX}.html" \
            --language en \
            --pdf "$PREVIEW_DIR/weekly_etf_eu_client_grade_${REPORT_SUFFIX}.pdf"

      - name: Record strict current v2 product validation
        run: |
          set +e
          python tools/validate_etf_eu_client_grade_report_v2_strict.py \
            --state "$STATE_ARTIFACT" \
            --dutch-html "$PREVIEW_DIR/weekly_etf_eu_client_grade_nl_${REPORT_SUFFIX}.html" \
            --dutch-pdf "$PREVIEW_DIR/weekly_etf_eu_client_grade_nl_${REPORT_SUFFIX}.pdf" \
            --english-html "$PREVIEW_DIR/weekly_etf_eu_client_grade_${REPORT_SUFFIX}.html" \
            --english-pdf "$PREVIEW_DIR/weekly_etf_eu_client_grade_${REPORT_SUFFIX}.pdf" \
            --output "output/quality/etf_eu_client_grade_v2_validation_${RUN_ID}.json"
          STATUS=$?
          echo "ETF_EU_V2_STRICT_VALIDATOR_EXIT=$STATUS"
          test -f "output/quality/etf_eu_client_grade_v2_validation_${RUN_ID}.json"
          exit 0

      - name: Render legacy and v2 review pages
        run: |
          set -euo pipefail
          python tools/render_etf_eu_pdf_review_pages.py --pdf "$LEGACY_DIR/weekly_etf_eu_review_nl_${REPORT_SUFFIX}.pdf" --output-dir "output/comparison/${RUN_ID}/legacy/nl" --write-index "output/comparison/${RUN_ID}/legacy/nl/index.json"
          python tools/render_etf_eu_pdf_review_pages.py --pdf "$LEGACY_DIR/weekly_etf_eu_review_${REPORT_SUFFIX}.pdf" --output-dir "output/comparison/${RUN_ID}/legacy/en" --write-index "output/comparison/${RUN_ID}/legacy/en/index.json"
          python tools/render_etf_eu_pdf_review_pages.py --pdf "$PREVIEW_DIR/weekly_etf_eu_client_grade_nl_${REPORT_SUFFIX}.pdf" --output-dir "output/comparison/${RUN_ID}/v2/nl" --write-index "output/comparison/${RUN_ID}/v2/nl/index.json"
          python tools/render_etf_eu_pdf_review_pages.py --pdf "$PREVIEW_DIR/weekly_etf_eu_client_grade_${REPORT_SUFFIX}.pdf" --output-dir "output/comparison/${RUN_ID}/v2/en" --write-index "output/comparison/${RUN_ID}/v2/en/index.json"

      - name: Write comparison evidence
        run: |
          set -euo pipefail
          python - <<'PY'
          import hashlib, json, subprocess
          from pathlib import Path

          run_id = "20260716_004315"
          suffix = "260716"
          preview = Path(f"output/client_grade_preview/{run_id}")
          legacy = Path("output/fresh_generation")
          state = json.loads(Path(f"output/runtime/etf_eu_client_grade_report_state_{run_id}.json").read_text())
          validation = json.loads(Path(f"output/quality/etf_eu_client_grade_v2_validation_{run_id}.json").read_text())
          files = {
              "legacy_nl_pdf": legacy / f"weekly_etf_eu_review_nl_{suffix}.pdf",
              "legacy_en_pdf": legacy / f"weekly_etf_eu_review_{suffix}.pdf",
              "v2_nl_pdf": preview / f"weekly_etf_eu_client_grade_nl_{suffix}.pdf",
              "v2_en_pdf": preview / f"weekly_etf_eu_client_grade_{suffix}.pdf",
          }
          def pages(path):
              raw = subprocess.run(["pdfinfo", str(path)], check=True, text=True, capture_output=True).stdout
              for line in raw.splitlines():
                  if line.startswith("Pages:"):
                      return int(line.split(":", 1)[1].strip())
              raise RuntimeError(path)
          def sha(path):
              return hashlib.sha256(path.read_bytes()).hexdigest()
          passed = validation.get("client_grade_v2_passed") is True
          payload = {
              "schema_version": "etf_eu_current_v2_shadow_comparison_v1",
              "run_id": run_id,
              "report_date": "2026-07-16",
              "report_suffix": suffix,
              "pricing_artifact": f"output/pricing/ucits_close_price_validation_basket_results_{run_id}.json",
              "macro_artifact": "output/macro/etf_eu_macro_policy_pack_2026-07-16_20260716_004315.json",
              "same_current_pricing_authority": True,
              "same_current_portfolio_state": True,
              "macro_fresh_for_report": state["macro"]["fresh_for_report"],
              "equity_surface": "equity_curve" if state["equity_curve"]["show_chart"] else "cash_preservation_callout",
              "strict_v2_validation_passed": passed,
              "validation_blockers": validation.get("blockers") or [],
              "files": {key: {"path": str(path), "pages": pages(path), "sha256": sha(path), "bytes": path.stat().st_size} for key, path in files.items()},
              "promotion_candidate": bool(passed and state["macro"]["fresh_for_report"]),
              "production_delivery_performed": False,
              "portfolio_mutation": False,
          }
          out = Path(f"output/comparison/{run_id}/etf_eu_current_v2_shadow_comparison.json")
          out.parent.mkdir(parents=True, exist_ok=True)
          out.write_text(json.dumps(payload, indent=2, sort_keys=True) + "\n")
          print(json.dumps(payload, indent=2, sort_keys=True))
          PY

      - name: Upload current-date comparison bundle
        uses: actions/upload-artifact@v4
        with:
          name: etf-eu-current-v2-shadow-${{ env.RUN_ID }}
          path: |
            output/pricing/ucits_close_price_validation_basket_results_${{ env.RUN_ID }}.json
            output/fresh_generation/weekly_etf_eu_review_nl_${{ env.REPORT_SUFFIX }}.*
            output/fresh_generation/weekly_etf_eu_review_${{ env.REPORT_SUFFIX }}.*
            output/runtime/etf_eu_valuation_history_${{ env.RUN_ID }}.csv
            output/runtime/etf_eu_client_grade_report_state_${{ env.RUN_ID }}.json
            output/client_grade_preview/${{ env.RUN_ID }}
            output/quality/etf_eu_client_grade_v2_validation_${{ env.RUN_ID }}.json
            output/comparison/${{ env.RUN_ID }}
